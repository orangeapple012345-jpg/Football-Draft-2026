<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Draft Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--pitch:#1a6b2e;--pitch2:#155924;
  --dark:#0d0d0d;--panel:#141414;--border:#2a2a2a;
  --text:#e8e8e8;--muted:#888;
  --p1:#3b82f6;--p2:#ef4444;--p1bg:#0f2340;--p2bg:#2a0a0a;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;
  --fh:'Bebas Neue',sans-serif;--fb:'Barlow Condensed',sans-serif;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--fb);font-size:16px;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* INTRO */
#screen-intro{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a3a1a,#0d0d0d 70%);text-align:center;gap:24px;padding:40px 20px}
.logo{font-family:var(--fh);font-size:clamp(48px,10vw,90px);letter-spacing:6px;line-height:1;color:var(--gold);text-shadow:0 0 60px rgba(245,200,66,.35)}
.sub{font-size:20px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.name-inputs{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.name-inputs input{background:#1a1a1a;border:2px solid var(--border);color:var(--text);font-family:var(--fb);font-size:17px;letter-spacing:2px;padding:11px 18px;border-radius:6px;width:210px;text-align:center;transition:border-color .2s}
.name-inputs input:focus{outline:none;border-color:var(--gold)}
.name-inputs input::placeholder{color:#555}
.btn{font-family:var(--fh);font-size:21px;letter-spacing:3px;background:var(--gold);color:#000;border:none;padding:13px 38px;border-radius:6px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,.3)}
.btn:active{transform:none}
.pitch-decor{width:min(480px,90vw);height:6px;background:repeating-linear-gradient(90deg,var(--pitch) 0 30px,var(--pitch2) 30px 60px);border-radius:3px}

/* DRAFT */
#screen-draft{flex-direction:column;height:100vh;overflow:hidden}
.draft-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#111;border-bottom:2px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap}
.turn-banner{font-family:var(--fh);font-size:18px;letter-spacing:3px}
.turn-banner.p1{color:var(--p1)}.turn-banner.p2{color:var(--p2)}
.draft-teams{display:flex;gap:6px}
.team-pill{font-size:11px;letter-spacing:1px;padding:4px 10px;border-radius:4px;font-weight:700}
.team-pill.p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.team-pill.p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.draft-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.pitch-panel{flex:1;display:flex;flex-direction:column;min-height:0;border-bottom:2px solid var(--border)}
.pitch-panel:last-child{border-bottom:none}
.pitch-label{font-family:var(--fh);font-size:12px;letter-spacing:3px;padding:3px 10px;flex-shrink:0}
.pitch-panel.p1 .pitch-label{color:var(--p1);background:var(--p1bg)}
.pitch-panel.p2 .pitch-label{color:var(--p2);background:var(--p2bg)}
.pitch-wrap{flex:1;background:repeating-linear-gradient(0deg,transparent 0,transparent 49px,rgba(255,255,255,.04) 49px,rgba(255,255,255,.04) 50px),linear-gradient(180deg,var(--pitch),var(--pitch2));padding:4px 6px;display:flex;align-items:stretch;overflow:hidden}
.formation-grid{display:flex;flex-direction:column;gap:3px;width:100%;justify-content:space-evenly}
.row{display:flex;justify-content:center;gap:3px}
.slot-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:52px;height:48px;border-radius:6px;border:1px dashed rgba(255,255,255,.25);background:rgba(0,0,0,.35);cursor:pointer;font-family:var(--fb);color:rgba(255,255,255,.7);font-size:9px;font-weight:600;letter-spacing:1px;transition:border-color .2s,background .2s,transform .1s;padding:2px;text-align:center;flex-shrink:0}
.slot-btn .pos-label{font-family:var(--fh);font-size:13px;letter-spacing:1px;color:#fff;line-height:1}
.slot-btn:hover:not(.filled):not(.locked){border-color:var(--gold);background:rgba(245,200,66,.12);transform:scale(1.06)}
.slot-btn.filled{border-style:solid;border-color:rgba(255,255,255,.2);background:rgba(0,0,0,.5);cursor:default}
.slot-btn.locked{opacity:.38;cursor:not-allowed}
.slot-btn .mini-face{width:26px;height:26px;border-radius:50%;object-fit:contain;background:#222;flex-shrink:0}
.slot-btn .mini-name{font-size:7px;text-align:center;line-height:1;color:#ddd;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-btn .mini-rat{font-family:var(--fh);font-size:11px;color:var(--gold);line-height:1}

/* PICK OVERLAY */
#pick-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;padding:8px 4px}
#pick-overlay.open{display:flex}
.pick-modal{background:#161616;border:1px solid var(--border);border-radius:12px;width:100%;max-width:680px;padding:12px 6px 14px}
.pick-modal h2{font-family:var(--fh);font-size:20px;letter-spacing:3px;margin-bottom:10px;text-align:center}
.pick-modal h2 span{color:var(--gold)}
.card-grid{display:flex;flex-wrap:nowrap;gap:4px;justify-content:center;padding:0 4px;overflow-x:auto}

/* FIFA CARD */
.fifa-card{width:calc(19vw - 4px);max-width:118px;min-width:56px;border-radius:10px;padding:8px 6px 10px;cursor:pointer;position:relative;transition:transform .2s,box-shadow .2s;user-select:none;flex-shrink:0}
.fifa-card.gold{background:linear-gradient(145deg,#5a4200,#c8932a 40%,#f5c842 60%,#c8932a)}
.fifa-card.silver{background:linear-gradient(145deg,#3a3f4a,#8a9099 40%,#c0c8d4 60%,#8a9099)}
.fifa-card.bronze{background:linear-gradient(145deg,#4a2800,#a05a1a 40%,#cd7f32 60%,#a05a1a)}
.fifa-card.special{background:linear-gradient(145deg,#0a2a3a,#0f4a6a 35%,#7fecff 55%,#0f4a6a 80%,#0a2a3a)}
.fifa-card:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 14px 36px rgba(0,0,0,.7)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-ovr{font-family:var(--fh);font-size:clamp(13px,3.8vw,22px);line-height:1;color:#1a1000}
.card-ovr-s{color:#001a22}
.card-pos{font-family:var(--fh);font-size:clamp(7px,2vw,11px);letter-spacing:1px;color:#1a1000;line-height:1.2}
.card-pos-s{color:#001a22}
.card-face-wrap{width:100%;aspect-ratio:1;border-radius:5px;overflow:hidden;background:rgba(0,0,0,.2);margin-bottom:6px}
.card-face-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.card-name{font-family:var(--fh);font-size:clamp(7px,2.2vw,12px);letter-spacing:.5px;text-align:center;color:#1a1000;margin-bottom:4px;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-name-s{color:#001a22}
.card-divider{height:1px;background:rgba(0,0,0,.2);margin-bottom:4px}
.card-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px 2px;text-align:center}
.card-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-val{font-family:var(--fh);font-size:clamp(8px,2.6vw,14px);color:#1a1000}
.stat-val-s{color:#001a22}
.stat-lbl{font-size:7px;font-weight:700;letter-spacing:.5px;color:rgba(26,16,0,.65);text-transform:uppercase}
.stat-lbl-s{color:rgba(0,26,34,.65)}
.card-nation{text-align:center;font-size:8px;letter-spacing:.5px;margin-top:4px;color:rgba(26,16,0,.55);text-transform:uppercase}
.card-nation-s{color:rgba(0,26,34,.55)}

/* RESULT PAGE */
#screen-result{align-items:center;justify-content:flex-start;background:radial-gradient(ellipse at 50% 0%,#1a3a1a,#0d0d0d 60%);padding:20px 12px;gap:18px;overflow-y:auto}
.res-section{width:100%;max-width:700px;background:#111;border:1px solid var(--border);border-radius:10px;padding:16px}
.res-section h3{font-family:var(--fh);font-size:19px;letter-spacing:3px;color:var(--gold);margin-bottom:12px}
.result-title{font-family:var(--fh);font-size:clamp(30px,8vw,62px);letter-spacing:6px;color:var(--gold);text-align:center;text-shadow:0 0 40px rgba(245,200,66,.4)}
.result-winner{font-family:var(--fh);font-size:clamp(20px,5vw,42px);letter-spacing:4px;text-align:center}
.result-winner.p1{color:var(--p1)}.result-winner.p2{color:var(--p2)}.result-winner.draw{color:var(--gold)}
.scoreline{font-family:var(--fh);font-size:clamp(36px,8vw,72px);letter-spacing:4px;text-align:center;color:#fff}
.scoreline .gls{color:var(--gold)}

/* SCORE BAR */
.score-bar-wrap{width:100%;max-width:700px}
.score-bar-label{display:flex;justify-content:space-between;font-family:var(--fh);font-size:16px;letter-spacing:2px;margin-bottom:5px}
.score-bar{height:20px;background:#1a1a1a;border-radius:10px;overflow:hidden;display:flex;border:1px solid var(--border)}
.score-bar .fill1{background:var(--p1);transition:width .8s ease}
.score-bar .fill2{background:var(--p2);transition:width .8s ease}

/* PHASE BARS */
.phase-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.phase-label{font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--muted);width:90px;flex-shrink:0;text-align:right}
.phase-bar{flex:1;height:12px;background:#1a1a1a;border-radius:6px;overflow:hidden;display:flex;border:1px solid var(--border)}
.phase-bar .pb1{background:var(--p1)}.phase-bar .pb2{background:var(--p2)}
.phase-scores{display:flex;justify-content:space-between;font-family:var(--fh);font-size:12px;color:var(--muted);margin-top:2px;padding:0 2px}
.phase-scores .best{color:var(--gold)}

/* MATCH REPORT */
.minute-event{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #1a1a1a}
.minute-event:last-child{border-bottom:none}
.min-badge{font-family:var(--fh);font-size:13px;color:var(--gold);min-width:38px;text-align:right;flex-shrink:0;padding-top:1px}
.event-icon{font-size:16px;flex-shrink:0}
.event-text{font-size:13px;color:var(--text);line-height:1.5}
.event-text .scorer{color:var(--gold);font-weight:700}
.event-text .assist{color:var(--green)}
.event-text .detail{color:var(--muted);font-size:11px;display:block;margin-top:2px}

/* RATINGS TABLE */
.ratings-table{width:100%;border-collapse:collapse}
.ratings-table th{font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--muted);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.ratings-table td{font-size:13px;padding:5px 6px;border-bottom:1px solid #1a1a1a;vertical-align:middle}
.ratings-table tr:last-child td{border-bottom:none}
.rating-num{font-family:var(--fh);font-size:16px}
.rating-num.elite{color:var(--gold)}
.rating-num.good{color:var(--green)}
.rating-num.avg{color:var(--text)}
.rating-num.poor{color:var(--amber)}
.rating-num.bad{color:var(--red)}
.rating-bar-wrap{width:80px;height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.rating-bar-fill{height:100%;border-radius:4px}
.mom-badge{background:var(--gold);color:#000;font-family:var(--fh);font-size:10px;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-left:6px}
.pos-badge{font-family:var(--fh);font-size:11px;letter-spacing:1px;color:var(--muted);margin-right:4px}

/* BATTLE CARDS */
.battle-card{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.battle-title{font-family:var(--fh);font-size:14px;letter-spacing:2px;color:var(--gold);margin-bottom:4px}
.battle-bar{height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;display:flex;margin:6px 0;border:1px solid var(--border)}
.battle-reason{font-size:12px;color:var(--muted);line-height:1.5}
.battle-effect{font-size:11px;color:var(--green);margin-top:4px;font-style:italic}

/* WEAKNESSES */
.weak-grid{display:flex;gap:10px;flex-wrap:wrap}
.weak-card{flex:1;min-width:180px;background:#0d0d0d;border-radius:8px;padding:10px;border:1px solid var(--border)}
.weak-card h4{font-family:var(--fh);font-size:13px;letter-spacing:2px;margin-bottom:8px}
.weak-card.p1 h4{color:var(--p1)}.weak-card.p2 h4{color:var(--p2)}
.weak-item{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid #1a1a1a;line-height:1.4}
.weak-item:last-child{border-bottom:none}
.weak-item .wi-label{color:var(--red);font-weight:700}

/* SQUADS */
.squad-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.mini-squad{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:360px}
.mini-squad h4{width:100%;font-family:var(--fh);font-size:13px;letter-spacing:2px;margin-bottom:5px;text-align:center}
.mini-squad h4.p1{color:var(--p1)}.mini-squad h4.p2{color:var(--p2)}
.mini-squad .fifa-card{width:82px;cursor:default;transform:none!important}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;font-family:var(--fh);font-size:16px;letter-spacing:2px;padding:10px 24px;border-radius:6px;z-index:999;transition:transform .3s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>

<!-- INTRO -->
<section id="screen-intro" class="screen active">
  <div class="logo">DRAFT<br/>ZONE</div>
  <div class="sub">Tactical Match Engine</div>
  <div class="pitch-decor"></div>
  <div class="name-inputs">
    <input id="name1" type="text" maxlength="16" placeholder="PLAYER 1 NAME"/>
    <input id="name2" type="text" maxlength="16" placeholder="PLAYER 2 NAME"/>
  </div>
  <button class="btn" onclick="startDraft()">KICK OFF</button>
</section>

<!-- DRAFT -->
<section id="screen-draft" class="screen">
  <div class="draft-header">
    <div id="turn-banner" class="turn-banner p1">— PLAYER 1'S TURN —</div>
    <div class="draft-teams">
      <div id="pill1" class="team-pill p1">P1: 0/11</div>
      <div id="pill2" class="team-pill p2">P2: 0/11</div>
    </div>
  </div>
  <div class="draft-body">
    <div class="pitch-panel p1">
      <div class="pitch-label" id="p1-name-head">PLAYER 1</div>
      <div class="pitch-wrap" id="pitch1"></div>
    </div>
    <div class="pitch-panel p2">
      <div class="pitch-label" id="p2-name-head">PLAYER 2</div>
      <div class="pitch-wrap" id="pitch2"></div>
    </div>
  </div>
</section>

<!-- PICK OVERLAY -->
<div id="pick-overlay">
  <div class="pick-modal">
    <h2>PICK YOUR <span id="pick-pos-label">PLAYER</span></h2>
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<!-- RESULT -->
<section id="screen-result" class="screen">
  <div class="result-title">FULL TIME</div>
  <div id="result-winner" class="result-winner"></div>
  <div id="scoreline-display" class="scoreline"></div>

  <div class="score-bar-wrap">
    <div class="score-bar-label">
      <span id="rb-n1" style="color:var(--p1)">P1</span>
      <span style="color:var(--muted);font-family:var(--fh);font-size:13px;letter-spacing:2px">MATCH RATING</span>
      <span id="rb-n2" style="color:var(--p2)">P2</span>
    </div>
    <div class="score-bar"><div class="fill1" id="rb-fill1" style="width:50%"></div><div class="fill2" id="rb-fill2" style="width:50%"></div></div>
    <div style="display:flex;justify-content:space-between;font-family:var(--fh);font-size:16px;margin-top:3px">
      <span id="rb-s1" style="color:var(--p1)">0</span>
      <span id="rb-s2" style="color:var(--p2)">0</span>
    </div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>📋 PHASE BREAKDOWN</h3>
    <div id="phase-rows"></div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>⚽ MATCH REPORT</h3>
    <div id="match-report"></div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>🏅 PLAYER RATINGS</h3>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:260px">
        <div id="ratings-name1" style="font-family:var(--fh);font-size:14px;letter-spacing:2px;color:var(--p1);margin-bottom:8px"></div>
        <table class="ratings-table" id="ratings-table1"></table>
      </div>
      <div style="flex:1;min-width:260px">
        <div id="ratings-name2" style="font-family:var(--fh);font-size:14px;letter-spacing:2px;color:var(--p2);margin-bottom:8px"></div>
        <table class="ratings-table" id="ratings-table2"></table>
      </div>
    </div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>⚔️ KEY BATTLES</h3>
    <div id="battle-cards"></div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>⚠️ VULNERABILITIES</h3>
    <div class="weak-grid" id="weak-grid"></div>
  </div>

  <div class="res-section" style="max-width:700px;width:100%">
    <h3>📊 SQUADS</h3>
    <div class="squad-row">
      <div class="mini-squad" id="squad1-cards"></div>
      <div class="mini-squad" id="squad2-cards"></div>
    </div>
  </div>

  <button class="btn" style="margin-top:4px;margin-bottom:32px" onclick="resetGame()">PLAY AGAIN</button>
</section>

<div id="toast"></div>
<script src="players.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════════════════════════════════
const LAYOUT=[
  {slot:"GK", label:"GK", role:"gk", row:0},
  {slot:"LB", label:"LB", role:"lb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"RB", label:"RB", role:"rb", row:1},
  {slot:"CDM",label:"CDM",role:"cdm",row:3},
  {slot:"CM", label:"CM", role:"cm", row:3},
  {slot:"CAM",label:"CAM",role:"cam",row:3},
  {slot:"LW", label:"LW", role:"lw", row:4},
  {slot:"RW", label:"RW", role:"rw", row:4},
  {slot:"ST", label:"ST", role:"st", row:5},
];

// Position-specific stat weights — what matters for each role
const POS_WEIGHTS={
  gk: {goalkeeperRating:.35,reflexes:.25,commandOfArea:.15,distribution:.1,physical:.05,intelligence:.1},
  cb: {defensiveAwareness:.22,tackling:.2,aerial:.16,physical:.14,pace:.12,intelligence:.1,positioning:.06},
  lb: {pace:.14,defensiveAwareness:.13,tackling:.12,stamina:.1,crossing:.1,workRate:.1,intelligence:.1,attack:.08,creativity:.07,physical:.06},
  rb: {pace:.14,defensiveAwareness:.13,tackling:.12,stamina:.1,crossing:.1,workRate:.1,intelligence:.1,attack:.08,creativity:.07,physical:.06},
  cdm:{defensiveAwareness:.2,tackling:.18,positioning:.16,physical:.12,intelligence:.12,midfield:.1,workRate:.08,pressResistance:.04},
  cm: {midfield:.18,passing:.16,pressResistance:.14,intelligence:.12,workRate:.1,stamina:.1,technical:.08,creativity:.08,physical:.04},
  cam:{creativity:.2,passing:.18,technical:.14,intelligence:.12,finishing:.1,attack:.1,dribbling:.08,pressResistance:.08},
  lw: {pace:.16,dribbling:.16,attack:.14,creativity:.12,finishing:.1,crossing:.1,transitionThreat:.1,workRate:.08,physical:.04},
  rw: {pace:.16,dribbling:.16,attack:.14,creativity:.12,finishing:.1,crossing:.1,transitionThreat:.1,workRate:.08,physical:.04},
  st: {finishing:.22,positioning:.18,attack:.15,pace:.12,physical:.1,aerial:.08,intelligence:.08,pressResistance:.07},
};

function positionScore(player,role){
  const w=POS_WEIGHTS[role]||{overall:.5,midfield:.25,defense:.25};
  let score=0;
  for(const[stat,weight] of Object.entries(w)){
    score+=(player[stat]||player.overall||70)*weight;
  }
  return Math.round(score);
}

function getPlayersForSlot(slot){
  let el;
  if(slot==="CDM") el=PLAYERS.filter(p=>p.positions.includes("CDM"));
  else if(slot==="CM") el=PLAYERS.filter(p=>p.positions.includes("CM"));
  else if(slot==="CAM") el=PLAYERS.filter(p=>p.positions.includes("CAM"));
  else el=PLAYERS.filter(p=>p.positions.includes(slot));
  return el.filter(p=>!state.drafted.has(p.name));
}

let state={};
function freshState(){return{names:["P1","P2"],turn:0,squads:[LAYOUT.map(()=>null),LAYOUT.map(()=>null)],drafted:new Set(),pendingSlot:null}}

function toast(msg,ms=2000){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),ms)}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pickCandidates(slot,count=5){return shuffle(getPlayersForSlot(slot)).slice(0,count)}
function avg(...vals){const v=vals.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function rng(min,max){return Math.random()*(max-min)+min}
function getByRole(squad,role){return LAYOUT.map((s,i)=>s.role===role?squad[i]:null).filter(Boolean)}
function getFirst(squad,role){return getByRole(squad,role)[0]||null}

const FALLBACK="data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="#333" width="200" height="200"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="80">⚽</text></svg>');

function cardHTML(player,displayPos,clickable=true){
  const sp=player.rarity==="special";const tc=sp?"-s":"";
  return`<div class="fifa-card ${player.rarity}"${clickable?` onclick="selectPlayer('${encodeURIComponent(player.name)}')"`:""}>
    <div class="card-top"><div><div class="card-ovr${tc}">${player.overall}</div><div class="card-pos${tc}">${displayPos||player.position}</div></div></div>
    <div class="card-face-wrap"><img src="${player.face}" alt="${player.name}" onerror="this.src='${FALLBACK}'"/></div>
    <div class="card-name${tc}">${player.name}</div>
    <div class="card-divider"></div>
    <div class="card-stats">
      <div class="card-stat"><div class="stat-val${tc}">${player.attack}</div><div class="stat-lbl${tc}">ATT</div></div>
      <div class="card-stat"><div class="stat-val${tc}">${player.midfield}</div><div class="stat-lbl${tc}">MID</div></div>
      <div class="card-stat"><div class="stat-val${tc}">${player.defense}</div><div class="stat-lbl${tc}">DEF</div></div>
    </div>
    <div class="card-nation${tc}">${player.nation}·${player.club}</div>
  </div>`
}

function buildPitch(idx){
  const el=document.getElementById(`pitch${idx+1}`);
  const isMyTurn=state.turn===idx;const squad=state.squads[idx];
  const rows={};
  LAYOUT.forEach((s,i)=>{if(!rows[s.row])rows[s.row]=[];rows[s.row].push({slotDef:s,slotIdx:i})});
  let html='<div class="formation-grid">';
  Object.keys(rows).sort((a,b)=>Number(b)-Number(a)).forEach(rk=>{
    html+='<div class="row">';
    rows[rk].forEach(({slotDef,slotIdx})=>{
      const p=squad[slotIdx];
      if(p) html+=`<div class="slot-btn filled"><img class="mini-face" src="${p.face}" onerror="this.src='${FALLBACK}'"/><div class="mini-name">${p.name.split(" ").pop()}</div><div class="mini-rat">${p.overall}</div></div>`;
      else if(isMyTurn) html+=`<button class="slot-btn" onclick="openPick(${idx},${slotIdx})"><div class="pos-label">${slotDef.label}</div><div style="font-size:7px;color:var(--muted)">tap</div></button>`;
      else html+=`<div class="slot-btn locked"><div class="pos-label">${slotDef.label}</div></div>`;
    });
    html+='</div>';
  });
  html+='</div>';el.innerHTML=html;
}
function rebuildPitches(){buildPitch(0);buildPitch(1);updateHeader()}
function updateHeader(){
  const name=state.names[state.turn];
  const b=document.getElementById("turn-banner");
  b.textContent=`— ${name.toUpperCase()}'S TURN —`;b.className=`turn-banner p${state.turn+1}`;
  const f0=state.squads[0].filter(Boolean).length,f1=state.squads[1].filter(Boolean).length;
  document.getElementById("pill1").textContent=`${state.names[0].toUpperCase()}: ${f0}/11`;
  document.getElementById("pill2").textContent=`${state.names[1].toUpperCase()}: ${f1}/11`;
}
function openPick(pi,si){
  if(state.turn!==pi){toast("Not your turn!");return}
  const sd=LAYOUT[si];const cands=pickCandidates(sd.slot);
  if(!cands.length){toast("No players left for this slot!");return}
  state.pendingSlot={pi,si};
  document.getElementById("pick-pos-label").textContent=sd.label;
  document.getElementById("card-grid").innerHTML=cands.map(p=>cardHTML(p,sd.slot,true)).join("");
  document.getElementById("pick-overlay").classList.add("open");
}
function selectPlayer(enc){
  const name=decodeURIComponent(enc);
  const player=PLAYERS.find(p=>p.name===name);if(!player)return;
  const{pi,si}=state.pendingSlot;
  state.squads[pi][si]=player;state.drafted.add(player.name);
  document.getElementById("pick-overlay").classList.remove("open");
  const p1Done=state.squads[0].every(Boolean),p2Done=state.squads[1].every(Boolean);
  if(p1Done&&p2Done){setTimeout(showResult,400);return}
  const other=1-pi;
  if(state.squads[other].some(s=>s===null))state.turn=other;
  else if(state.squads[pi].some(s=>s===null))state.turn=pi;
  rebuildPitches();toast(`${player.name} drafted!`);
}

// ═══════════════════════════════════════════════════════════════════════
//  TEAM PROFILE — uses position-weighted scores throughout
// ═══════════════════════════════════════════════════════════════════════
function buildProfile(squad){
  const gk=getFirst(squad,"gk");
  const cbs=getByRole(squad,"cb");
  const lb=getFirst(squad,"lb");
  const rb=getFirst(squad,"rb");
  const cdm=getFirst(squad,"cdm");
  const cm=getFirst(squad,"cm");
  const cam=getFirst(squad,"cam");
  const lw=getFirst(squad,"lw");
  const rw=getFirst(squad,"rw");
  const st=getFirst(squad,"st");
  const all=squad.filter(Boolean);

  // Position-weighted effectiveness scores
  const gkScore=gk?positionScore(gk,"gk"):55;
  const cbScore=cbs.length?avg(...cbs.map(c=>positionScore(c,"cb"))):55;
  const lbScore=lb?positionScore(lb,"lb"):55;
  const rbScore=rb?positionScore(rb,"rb"):55;
  const cdmScore=cdm?positionScore(cdm,"cdm"):55;
  const cmScore=cm?positionScore(cm,"cm"):55;
  const camScore=cam?positionScore(cam,"cam"):55;
  const lwScore=lw?positionScore(lw,"lw"):55;
  const rwScore=rw?positionScore(rw,"rw"):55;
  const stScore=st?positionScore(st,"st"):55;

  // Raw aggregates (for context checks)
  const s=key=>avg(...all.map(p=>p[key]||0));
  const pace=s("pace"),pressing=s("pressing"),workRate=s("workRate");
  const stamina=s("stamina"),pressResistance=s("pressResistance");
  const intelligence=s("intelligence"),creativity=s("creativity");
  const physical=s("physical"),technical=s("technical");

  // CB specific
  const cbPace=cbs.length?avg(...cbs.map(c=>c.pace)):60;
  const cbAerial=cbs.length?avg(...cbs.map(c=>c.aerial)):70;
  const cbDefAware=cbs.length?avg(...cbs.map(c=>c.defensiveAwareness)):70;
  const cbTackle=cbs.length?avg(...cbs.map(c=>c.tackling)):70;

  // Attacking
  const stFinish=st?st.finishing:60;
  const stAerial=st?st.aerial:70;
  const attackPace=avg(...[lw,rw,st].filter(Boolean).map(p=>p.pace));
  const crossing=avg(...[lb,rb,lw,rw,cam].filter(Boolean).map(p=>p.crossing));
  const setPieces=avg(...all.map(p=>p.setPieces));
  const transitionThreat=avg(...[lw,rw,st].filter(Boolean).map(p=>p.transitionThreat));

  // CDM protection
  const cdmProtection=cdm?positionScore(cdm,"cdm"):50;

  // FB attack tendency
  const fbAttackRisk=avg(...[lb,rb].filter(Boolean).map(p=>{
    const hasTrait=(p.traits||[]).includes("attackingFullback");
    return hasTrait?p.attack*1.1:p.attack*0.65;
  }));

  // GK
  const gkRating=gk?avg(gk.goalkeeperRating||70,gk.reflexes||70):60;
  const gkDistrib=gk?gk.distribution||70:60;

  // Playstyle detection
  const ps=all.flatMap(p=>p.playstyles||[]);
  const countP=s2=>ps.filter(x=>x===s2).length;
  const archetype=["counterAttack","possession","highPress","direct","wide","organised"]
    .sort((a,b)=>countP(b)-countP(a))[0];

  // Synergy bonus (raw number added to final score)
  function calcSynergy(){
    let bonus=0;
    const traits=all.flatMap(p=>p.traits||[]);
    const has=t=>traits.includes(t);
    if((has("crossingSpecialist")||crossing>78)&&stAerial>82)bonus+=7;
    if(has("attackingFullback")&&attackPace>84)bonus+=5;
    if(countP("highPress")>=4&&pressResistance>82)bonus+=6;
    if(countP("counterAttack")>=3&&transitionThreat>82)bonus+=5;
    if(creativity>82&&stFinish>88)bonus+=5;
    if(countP("possession")>=4&&pressResistance>80)bonus+=4;
    if(avg(...all.map(p=>p.weakFoot||70))>80)bonus+=3;
    // Penalties
    if(fbAttackRisk>70&&cdmProtection<68)bonus-=6;
    if(pressing<62&&countP("highPress")>=3)bonus-=5;
    if(crossing>80&&stAerial<70)bonus-=4;
    return clamp(bonus,-20,20);
  }

  return{
    gk,cbs,lb,rb,cdm,cm,cam,lw,rw,st,all,
    gkScore,cbScore,lbScore,rbScore,cdmScore,cmScore,camScore,lwScore,rwScore,stScore,
    pace,pressing,workRate,stamina,pressResistance,intelligence,creativity,physical,technical,
    cbPace,cbAerial,cbDefAware,cbTackle,
    stFinish,stAerial,attackPace,crossing,setPieces,transitionThreat,
    cdmProtection,fbAttackRisk,gkRating,gkDistrib,
    archetype,synergy:calcSynergy(),
    countP,traits:all.flatMap(p=>p.traits||[])
  };
}

// ═══════════════════════════════════════════════════════════════════════
//  PHASE SCORES — position-contextual
// ═══════════════════════════════════════════════════════════════════════
function calcPhases(A,B){

  // ATTACK vs DEFENCE
  function attackVsDef(atk,def){
    // Attackers' position-weighted effectiveness
    let score=avg(atk.stScore,atk.lwScore,atk.rwScore,atk.camScore)*0.45;
    // Pace advantage contextual — only matters if CB pace is low and space exists
    const paceDiff=clamp(atk.attackPace-def.cbPace,-25,25);
    const spaceCtx=clamp((100-def.cbDefAware)/40,.3,1);
    score+=paceDiff*spaceCtx*0.35;
    // Intelligence reduces pace threat
    score-=clamp(def.intelligence-78,0,18)*0.25;
    // CDM screens
    score-=clamp(def.cdmProtection-65,0,20)*0.22;
    // Aerial vs aerial
    score+=(atk.stAerial-def.cbAerial)*0.12;
    // Finishing quality
    score+=clamp(atk.stFinish-80,0,18)*0.28;
    // Creativity in final third
    score+=clamp(atk.creativity-74,0,18)*0.18;
    // GK quality reduces goal threat
    score-=clamp(def.gkRating-74,0,16)*0.2;
    // Fullback attack — leaves gaps that can be exploited
    score+=clamp(def.fbAttackRisk-55,0,20)*0.12;
    return clamp(score,20,96);
  }
  const aAtk=attackVsDef(A,B);
  const bAtk=attackVsDef(B,A);

  // MIDFIELD
  function midfieldBattle(atk,def){
    let score=avg(atk.cdmScore,atk.cmScore,atk.camScore)*0.5;
    const pressAdv=clamp(atk.pressResistance-def.pressing,-18,18)*0.35;
    score+=pressAdv;
    score+=clamp(atk.workRate-70,0,20)*0.2;
    score+=clamp(atk.stamina-74,0,15)*0.15;
    score+=clamp(atk.intelligence-78,0,15)*0.18;
    score+=(atk.physical-def.physical)*0.12;
    score+=clamp(atk.technical-78,0,15)*0.18;
    return clamp(score,25,95);
  }
  const aMid=midfieldBattle(A,B);
  const bMid=midfieldBattle(B,A);

  // TRANSITION
  function transition(atk,def){
    // Raw transition threat from forward positions
    let score=avg(atk.lwScore,atk.rwScore,atk.stScore)*0.3+atk.transitionThreat*0.4;
    // Context: only fully effective against high/attacking defences
    const lineRisk=clamp((100-def.cbDefAware)/35,.3,.9);
    const fbRisk=clamp((def.fbAttackRisk-50)/50,.1,.6);
    score*=(0.45+lineRisk*0.3+fbRisk*0.25);
    score-=clamp(def.intelligence-78,0,18)*0.28;
    score-=clamp(def.cdmProtection-68,0,18)*0.3;
    score-=clamp(def.cbPace-72,0,20)*0.22;
    score+=clamp(atk.attackPace-80,0,18)*0.3;
    return clamp(score,15,95);
  }
  const aTrans=transition(A,B);
  const bTrans=transition(B,A);

  // WIDE BATTLE — uses FB and winger position scores
  function wideBattle(atk,def){
    // LW vs RB, RW vs LB
    const lwVsRb=atk.lwScore-def.rbScore;
    const rwVsLb=atk.rwScore-def.lbScore;
    let score=avg(atk.lwScore,atk.rwScore)*0.5+avg(lwVsRb,rwVsLb)*0.35;
    // Attacking fullbacks create overloads but leave gaps — attacker benefits
    score+=clamp(def.fbAttackRisk-55,0,20)*0.18;
    // Crossing quality with aerial target
    score+=clamp(atk.crossing-72,0,20)*0.18;
    return clamp(score,20,92);
  }
  const aWide=wideBattle(A,B);
  const bWide=wideBattle(B,A);

  // DEFENSIVE STRUCTURE
  function defStructure(prof){
    let score=avg(prof.cbScore,prof.lbScore,prof.rbScore)*0.45;
    score+=clamp(prof.cdmProtection-65,0,22)*0.3;
    score+=clamp(prof.gkRating-72,0,18)*0.25;
    score+=clamp(prof.intelligence-76,0,16)*0.18;
    score+=clamp(prof.cbPace-68,0,20)*0.18;
    // Attacking fullbacks hurt defensive structure
    score-=clamp(prof.fbAttackRisk-65,0,20)*0.2;
    return clamp(score,20,95);
  }
  const aDefStr=defStructure(A);
  const bDefStr=defStructure(B);

  // SET PIECES
  function setP(atk,def){
    let score=avg(atk.setPieces,atk.crossing)*0.5;
    score+=clamp(atk.stAerial-70,0,20)*0.28;
    // Tallest/most aerial CBs in team help defend
    score-=clamp(def.cbAerial-72,0,20)*0.24;
    score-=clamp(def.gkRating-76,0,14)*0.18;
    return clamp(score,20,90);
  }
  const aSP=setP(A,B);
  const bSP=setP(B,A);

  // PRESSING
  function pressing(atk,def){
    let score=avg(atk.pressing,atk.workRate,atk.stamina)*0.48;
    const adv=clamp(atk.pressing-def.pressResistance,-18,18)*0.38;
    score+=adv;
    score-=clamp(def.gkDistrib-76,0,14)*0.18;
    return clamp(score,20,90);
  }
  const aPress=pressing(A,B);
  const bPress=pressing(B,A);

  // SYNERGY
  const aSyn=clamp(60+A.synergy,35,80);
  const bSyn=clamp(60+B.synergy,35,80);

  // GK
  const aGK=clamp(A.gkRating,40,95);
  const bGK=clamp(B.gkRating,40,95);

  // FINAL
  function final(atk,mid,defStr,trans,wide,sp,press,syn,gk){
    return atk*.18+mid*.16+defStr*.16+trans*.12+wide*.10+press*.08+sp*.06+gk*.06+syn*.08;
  }
  const aFin=final(aAtk,aMid,aDefStr,aTrans,aWide,aSP,aPress,aSyn,aGK);
  const bFin=final(bAtk,bMid,bDefStr,bTrans,bWide,bSP,bPress,bSyn,bGK);

  return{aAtk,bAtk,aMid,bMid,aTrans,bTrans,aWide,bWide,aDefStr,bDefStr,aSP,bSP,aPress,bPress,aSyn,bSyn,aGK,bGK,aFin,bFin};
}

// ═══════════════════════════════════════════════════════════════════════
//  PLAYER RATINGS ENGINE
//  Each player gets a match rating influenced by:
//  - Their position-weighted effectiveness
//  - How their opponent handled their role
//  - Consistency and big game rating (randomness bounds)
//  - Specific contextual bonuses (scorer, assist, MOTM)
// ═══════════════════════════════════════════════════════════════════════
function calcPlayerRatings(squadA,squadB,profA,profB,phases){
  function ratePlayer(player,role,oppProf,teamPhases,oppTeamPhases){
    const baseScore=positionScore(player,role);
    // Context modifier — how did this position's phase go?
    let ctxMod=0;
    if(["st","lw","rw"].includes(role)){
      ctxMod=(teamPhases.aAtk-oppTeamPhases.bAtk)*0.08;
    } else if(["cb","lb","rb"].includes(role)){
      ctxMod=(teamPhases.aDefStr-oppTeamPhases.bDefStr)*0.07;
    } else if(["cdm","cm","cam"].includes(role)){
      ctxMod=(teamPhases.aMid-oppTeamPhases.bMid)*0.07;
    } else if(role==="gk"){
      // GK rated better when team is under pressure
      ctxMod=(oppTeamPhases.bAtk-teamPhases.aAtk)*0.05;
    }
    // Base rating: 5.5 to 8.5 range from positionScore (55-95 mapped to 5.5-8.5)
    let rating=5.0+(baseScore/100)*3.5+ctxMod;
    // Consistency bound — inconsistent players vary more
    const consistency=(player.consistency||75)/100;
    const variance=(1-consistency)*1.2;
    rating+=rng(-variance,variance);
    // Big game boost/dip
    const bigGame=(player.bigGameRating||75)/100;
    rating+=rng(-0.3,bigGame*0.5);
    return clamp(rating,4.0,10.0);
  }

  const ratingsA=squadA.map((p,i)=>{
    if(!p)return null;
    const role=LAYOUT[i].role;
    const r=ratePlayer(p,role,profB,{aAtk:phases.aAtk,aDefStr:phases.aDefStr,aMid:phases.aMid},{bAtk:phases.bAtk,bDefStr:phases.bDefStr,bMid:phases.bMid});
    return{player:p,role,rating:Math.round(r*10)/10};
  }).filter(Boolean);

  const ratingsB=squadB.map((p,i)=>{
    if(!p)return null;
    const role=LAYOUT[i].role;
    const r=ratePlayer(p,role,profA,{aAtk:phases.bAtk,aDefStr:phases.bDefStr,aMid:phases.bMid},{bAtk:phases.aAtk,bDefStr:phases.aDefStr,bMid:phases.aMid});
    return{player:p,role,rating:Math.round(r*10)/10};
  }).filter(Boolean);

  // Assign MOTM to highest-rated player on winning side (or overall if draw)
  const allRatings=[...ratingsA.map(r=>({...r,team:0})),...ratingsB.map(r=>({...r,team:1}))];
  const motm=allRatings.sort((a,b)=>b.rating-a.rating)[0];

  return{ratingsA,ratingsB,motm};
}

// ═══════════════════════════════════════════════════════════════════════
//  MATCH SIMULATION — generates goals, assists, key events
// ═══════════════════════════════════════════════════════════════════════
function simulateMatch(squadA,squadB,profA,profB,phases,ratingsA,ratingsB){
  // Expected goals from phases
  const aXG=clamp(((phases.aAtk-50)/50)*2.5+rng(-0.4,0.6),0,6);
  const bXG=clamp(((phases.bAtk-50)/50)*2.5+rng(-0.4,0.6),0,6);

  // GK saves some
  const aGoals=Math.round(aXG*clamp(1-(profB.gkRating-70)/120,0.5,1));
  const bGoals=Math.round(bXG*clamp(1-(profA.gkRating-70)/120,0.5,1));

  // Pick likely scorers from squad weighted by finishing & positioning
  function pickScorer(squad,ratingsArr,profTeam){
    const attackers=[...getByRole(squad,"st"),...getByRole(squad,"lw"),...getByRole(squad,"rw"),...getByRole(squad,"cam")];
    const weights=attackers.map(p=>(p.finishing||60)+(p.positioning||60)+(p.attack||60));
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    for(let i=0;i<attackers.length;i++){r-=weights[i];if(r<=0)return attackers[i]}
    return attackers[0]||squad.filter(Boolean)[0];
  }

  function pickAssist(squad,scorer){
    const providers=[...getByRole(squad,"cam"),...getByRole(squad,"cm"),...getByRole(squad,"lb"),...getByRole(squad,"rb"),...getByRole(squad,"lw"),...getByRole(squad,"rw")];
    const notScorer=providers.filter(p=>p&&p.name!==scorer?.name);
    if(!notScorer.length)return null;
    const w=notScorer.map(p=>(p.passing||60)+(p.crossing||50)+(p.creativity||60));
    const tot=w.reduce((a,b)=>a+b,0);
    let r2=Math.random()*tot;
    for(let i=0;i<notScorer.length;i++){r2-=w[i];if(r2<=0)return notScorer[i]}
    return notScorer[0];
  }

  // Generate goal events with minutes
  const events=[];
  const usedMinutes=new Set();
  function uniqueMin(base,spread){
    let m=Math.round(base+rng(-spread,spread));
    m=clamp(m,1,95);
    while(usedMinutes.has(m))m=m<90?m+1:m-1;
    usedMinutes.add(m);return m;
  }

  // Goals for team A
  for(let i=0;i<aGoals;i++){
    const scorer=pickScorer(squadA,ratingsA,profA);
    const assist=pickAssist(squadA,scorer);
    const min=uniqueMin(20+i*18,15);
    const method=scorer&&scorer.aerial>80&&Math.random()<0.3?"header":(scorer&&scorer.pace>86&&Math.random()<0.3?"run in behind":"finish");
    const assistDesc=assist?` | Assist: ${assist.name}`:"";
    events.push({min,team:0,scorer,assist,method,desc:`Goal for ${state.names[0]}`,assistDesc});
  }
  // Goals for team B
  for(let i=0;i<bGoals;i++){
    const scorer=pickScorer(squadB,ratingsB,profB);
    const assist=pickAssist(squadB,scorer);
    const min=uniqueMin(25+i*18,15);
    const method=scorer&&scorer.aerial>80&&Math.random()<0.3?"header":(scorer&&scorer.pace>86&&Math.random()<0.3?"run in behind":"finish");
    const assistDesc=assist?` | Assist: ${assist.name}`:"";
    events.push({min,team:1,scorer,assist,method,desc:`Goal for ${state.names[1]}`,assistDesc});
  }

  // Key non-goal events
  const allA=squadA.filter(Boolean),allB=squadB.filter(Boolean);

  // Big chance missed (if XG was high but goals lower)
  if(aXG>aGoals+0.8){
    const p=pickScorer(squadA,ratingsA,profA);
    if(p)events.push({min:uniqueMin(40,20),team:0,scorer:null,assist:null,method:"miss",desc:`Big chance missed`,player:p,note:`${p.name} fails to convert a clear opportunity`});
  }
  if(bXG>bGoals+0.8){
    const p=pickScorer(squadB,ratingsB,profB);
    if(p)events.push({min:uniqueMin(55,20),team:1,scorer:null,assist:null,method:"miss",desc:`Big chance missed`,player:p,note:`${p.name} fails to convert a clear opportunity`});
  }

  // Great save
  const gkA=getFirst(squadA,"gk"),gkB=getFirst(squadB,"gk");
  if(gkA&&phases.bAtk>65)events.push({min:uniqueMin(35,20),team:0,scorer:null,method:"save",player:gkA,note:`${gkA.name} makes a crucial save to keep ${state.names[0]} level`});
  if(gkB&&phases.aAtk>65)events.push({min:uniqueMin(60,20),team:1,scorer:null,method:"save",player:gkB,note:`${gkB.name} produces a fine save to deny the opposition`});

  // Pressing win
  if(profA.pressing>76){
    const presser=allA.sort((a,b)=>(b.pressing||0)-(a.pressing||0))[0];
    if(presser)events.push({min:uniqueMin(28,15),team:0,method:"press",player:presser,note:`${presser.name} wins the ball high up the pitch with an intense press`});
  }
  if(profB.pressing>76){
    const presser=allB.sort((a,b)=>(b.pressing||0)-(a.pressing||0))[0];
    if(presser)events.push({min:uniqueMin(52,15),team:1,method:"press",player:presser,note:`${presser.name} dispossesses the opposition with tenacious pressing`});
  }

  // Set piece threat
  if(phases.aSP>62){
    const taker=allA.sort((a,b)=>(b.setPieces||0)-(a.setPieces||0))[0];
    const target=allA.sort((a,b)=>(b.aerial||0)-(a.aerial||0))[0];
    if(taker&&target&&taker.name!==target.name)events.push({min:uniqueMin(70,15),team:0,method:"setpiece",player:taker,note:`${taker.name} delivers a dangerous set piece. ${target.name} wins the aerial duel`});
  }

  // Dribble/transition moment
  const fastA=[...getByRole(squadA,"lw"),...getByRole(squadA,"rw"),...getByRole(squadA,"st")].filter(p=>p&&p.pace>85);
  if(fastA.length){
    const p=fastA[0];
    events.push({min:uniqueMin(45,20),team:0,method:"run",player:p,note:`${p.name} burns past the fullback with electric pace and forces a defensive scramble`});
  }
  const fastB=[...getByRole(squadB,"lw"),...getByRole(squadB,"rw"),...getByRole(squadB,"st")].filter(p=>p&&p.pace>85);
  if(fastB.length){
    const p=fastB[0];
    events.push({min:uniqueMin(67,20),team:1,method:"run",player:p,note:`${p.name} explodes into a transition and draws the defence wide open`});
  }

  events.sort((a,b)=>a.min-b.min);
  return{aGoals,bGoals,events};
}

// ═══════════════════════════════════════════════════════════════════════
//  KEY BATTLES
// ═══════════════════════════════════════════════════════════════════════
function calcBattles(squadA,squadB,profA,profB,phases){
  const battles=[];

  // ST vs CB
  const st1=getFirst(squadA,"st");const cbs2=getByRole(squadB,"cb");
  if(st1&&cbs2.length){
    const stPow=positionScore(st1,"st");
    const cbPow=avg(...cbs2.map(c=>positionScore(c,"cb")));
    const diff=stPow-cbPow;
    battles.push({
      title:`${st1.name} vs ${cbs2.map(c=>c.name).join(" & ")}`,
      a:clamp(50+diff*0.6,20,80),b:clamp(50-diff*0.6,20,80),
      reason:diff>6?`${st1.name}'s finishing and movement is a constant problem. The CB pairing struggle to contain him.`:diff<-6?`${cbs2.map(c=>c.name).join(" & ")} dominate aerially and physically. ${st1.name} gets very few sights of goal.`:`A competitive duel. Moments of quality on both sides.`,
      effect:diff>4?`Team A's striker is a consistent scoring threat.`:diff<-4?`Team B's defence neutralises the striker threat.`:`The striking vs defending battle is evenly contested.`
    });
  }

  // LW vs RB
  const lw1=getFirst(squadA,"lw");const rb2=getFirst(squadB,"rb");
  if(lw1&&rb2){
    const lwPow=positionScore(lw1,"lw");const rbPow=positionScore(rb2,"rb");
    const diff=lwPow-rbPow;
    battles.push({
      title:`${lw1.name} vs ${rb2.name}`,
      a:clamp(50+diff*0.6,20,80),b:clamp(50-diff*0.6,20,80),
      reason:diff>6?`${lw1.name}'s ${lw1.pace>88?"blistering pace":"dribbling quality"} creates consistent problems for ${rb2.name}.`:diff<-6?`${rb2.name} is exceptional defensively and keeps ${lw1.name} very quiet.`:`Both players trade blows on this flank throughout.`,
      effect:diff>4?`Team A's left flank is a key danger zone.`:diff<-4?`Team B right side is largely watertight.`:`The left flank battle is well-contested.`
    });
  }

  // RW vs LB
  const rw1=getFirst(squadA,"rw");const lb2=getFirst(squadB,"lb");
  if(rw1&&lb2){
    const rwPow=positionScore(rw1,"rw");const lbPow=positionScore(lb2,"lb");
    const diff=rwPow-lbPow;
    battles.push({
      title:`${rw1.name} vs ${lb2.name}`,
      a:clamp(50+diff*0.6,20,80),b:clamp(50-diff*0.6,20,80),
      reason:diff>6?`${rw1.name} is unplayable on the right. ${lb2.name} can't cope.`:diff<-6?`${lb2.name} is superb. ${rw1.name} is frustrated throughout.`:`An evenly matched battle on the right flank.`,
      effect:diff>4?`Team A right flank is consistently dangerous.`:diff<-4?`Team B left side defends superbly.`:`Neither side gains a wide advantage.`
    });
  }

  // CDM vs CAM
  const cdm1=getFirst(squadA,"cdm");const cam2=getFirst(squadB,"cam");
  if(cdm1&&cam2){
    const cdmPow=positionScore(cdm1,"cdm");const camPow=positionScore(cam2,"cam");
    const diff=cdmPow-camPow;
    battles.push({
      title:`${cdm1.name} screens vs ${cam2.name}`,
      a:clamp(50+diff*0.6,20,80),b:clamp(50-diff*0.6,20,80),
      reason:diff>5?`${cdm1.name}'s positioning and intelligence cuts off ${cam2.name}'s creative supply.`:diff<-5?`${cam2.name} finds pockets between the lines. ${cdm1.name} can't cover every angle.`:`Both players cancel each other out in a compelling central battle.`,
      effect:diff>4?`Team B's creative outlet is severely limited.`:diff<-4?`Team B exploit the space behind Team A's midfield.`:`Central midfield is fiercely contested.`
    });
  }

  // GK vs GK
  const gk1=getFirst(squadA,"gk");const gk2=getFirst(squadB,"gk");
  if(gk1&&gk2){
    const gk1Pow=positionScore(gk1,"gk");const gk2Pow=positionScore(gk2,"gk");
    const diff=gk1Pow-gk2Pow;
    battles.push({
      title:`${gk1.name} vs ${gk2.name}`,
      a:clamp(50+diff*0.6,20,80),b:clamp(50-diff*0.6,20,80),
      reason:diff>6?`${gk1.name} is the superior keeper and will make the saves that matter most.`:diff<-6?`${gk2.name} is the standout keeper — decisive saves could decide the match.`:`Both goalkeepers are high quality. Expect crucial moments at both ends.`,
      effect:diff>4?`Team A's keeper is a decisive asset.`:diff<-4?`Team B's keeper could prove the difference.`:`Goalkeeping quality comparable — no advantage either way.`
    });
  }

  return battles;
}

// ═══════════════════════════════════════════════════════════════════════
//  WEAKNESSES
// ═══════════════════════════════════════════════════════════════════════
function detectWeaknesses(prof,opp){
  const issues=[];
  if(prof.cbPace<72&&opp.attackPace>82)issues.push({label:"Slow CB pace",detail:`Opponent avg attack pace ${Math.round(opp.attackPace)} vs CB pace ${Math.round(prof.cbPace)} — dangerous in behind.`});
  if(prof.cdmProtection<65&&opp.transitionThreat>78)issues.push({label:"Weak CDM screen",detail:"The defensive midfield doesn't screen well enough against quick transitions."});
  if(prof.pressResistance<68&&opp.pressing>76)issues.push({label:"Low press resistance",detail:"Midfield will struggle to play out under sustained high pressure."});
  if(prof.cbAerial<74&&(opp.crossing>78||opp.setPieces>78))issues.push({label:"Aerial weakness",detail:"Vulnerable to crosses and set pieces from a team that loves delivery."});
  if(prof.fbAttackRisk>72&&prof.cdmProtection<70)issues.push({label:"Exposed fullbacks",detail:"Fullbacks push high with insufficient CDM protection — counter-attack risk."});
  if(prof.gkRating<74)issues.push({label:"GK below par",detail:"Below-average goalkeeping could cost crucial saves."});
  if(prof.stFinish<68)issues.push({label:"Poor finishing",detail:"Chances will be created but the striker may not convert consistently."});
  if(prof.workRate<65)issues.push({label:"Low work rate",detail:"Players don't press enough — opponents will have too much time on the ball."});
  if(prof.crossing>80&&prof.stAerial<70)issues.push({label:"Crosses without aerial threat",detail:"Great delivery quality but no striker to win it in the air."});
  return issues;
}

// ═══════════════════════════════════════════════════════════════════════
//  RENDER RESULT
// ═══════════════════════════════════════════════════════════════════════
function showResult(){
  const n0=state.names[0],n1=state.names[1];
  const profA=buildProfile(state.squads[0]);
  const profB=buildProfile(state.squads[1]);
  const phases=calcPhases(profA,profB);
  const{ratingsA,ratingsB,motm}=calcPlayerRatings(state.squads[0],state.squads[1],profA,profB,phases);
  const sim=simulateMatch(state.squads[0],state.squads[1],profA,profB,phases,ratingsA,ratingsB);
  const battles=calcBattles(state.squads[0],state.squads[1],profA,profB,phases);
  const weakA=detectWeaknesses(profA,profB);
  const weakB=detectWeaknesses(profB,profA);
  const diff=phases.aFin-phases.bFin;

  // Boost scorer and assister ratings
  sim.events.filter(e=>e.scorer&&e.team===0).forEach(e=>{
    const r=ratingsA.find(x=>x.player.name===e.scorer.name);
    if(r)r.rating=Math.min(10,r.rating+rng(0.3,0.8));
    if(e.assist){const r2=ratingsA.find(x=>x.player.name===e.assist.name);if(r2)r2.rating=Math.min(10,r2.rating+rng(0.2,0.5));}
  });
  sim.events.filter(e=>e.scorer&&e.team===1).forEach(e=>{
    const r=ratingsB.find(x=>x.player.name===e.scorer.name);
    if(r)r.rating=Math.min(10,r.rating+rng(0.3,0.8));
    if(e.assist){const r2=ratingsB.find(x=>x.player.name===e.assist.name);if(r2)r2.rating=Math.min(10,r2.rating+rng(0.2,0.5));}
  });
  // Round after boosts
  ratingsA.forEach(r=>r.rating=Math.round(r.rating*10)/10);
  ratingsB.forEach(r=>r.rating=Math.round(r.rating*10)/10);

  // Recalculate MOTM after boosts
  const allR=[...ratingsA.map(r=>({...r,t:0})),...ratingsB.map(r=>({...r,t:1}))];
  const trueMOTM=allR.sort((a,b)=>b.rating-a.rating)[0];

  // ── WINNER BANNER
  const winEl=document.getElementById("result-winner");
  if(Math.abs(diff)<2){winEl.textContent="IT'S A DRAW";winEl.className="result-winner draw"}
  else if(diff>0){winEl.textContent=`🏆 ${n0.toUpperCase()} WINS`;winEl.className="result-winner p1"}
  else{winEl.textContent=`🏆 ${n1.toUpperCase()} WINS`;winEl.className="result-winner p2"}

  // ── SCORELINE
  document.getElementById("scoreline-display").innerHTML=
    `<span class="gls" style="color:var(--p1)">${n0.toUpperCase()}</span> <span class="gls">${sim.aGoals}</span> – <span class="gls">${sim.bGoals}</span> <span class="gls" style="color:var(--p2)">${n1.toUpperCase()}</span>`;

  // ── SCORE BAR
  document.getElementById("rb-n1").textContent=n0.toUpperCase();
  document.getElementById("rb-n2").textContent=n1.toUpperCase();
  const tot=phases.aFin+phases.bFin;
  const pA=Math.round(phases.aFin/tot*100);
  document.getElementById("rb-fill1").style.width=pA+"%";
  document.getElementById("rb-fill2").style.width=(100-pA)+"%";
  document.getElementById("rb-s1").textContent=Math.round(phases.aFin);
  document.getElementById("rb-s2").textContent=Math.round(phases.bFin);

  // ── PHASE BARS
  const phaseList=[
    {label:"ATTACK",a:phases.aAtk,b:phases.bAtk},
    {label:"MIDFIELD",a:phases.aMid,b:phases.bMid},
    {label:"DEFENCE",a:phases.aDefStr,b:phases.bDefStr},
    {label:"TRANSITION",a:phases.aTrans,b:phases.bTrans},
    {label:"WIDE",a:phases.aWide,b:phases.bWide},
    {label:"PRESSING",a:phases.aPress,b:phases.bPress},
    {label:"SET PIECES",a:phases.aSP,b:phases.bSP},
    {label:"GOALKEEPER",a:phases.aGK,b:phases.bGK},
    {label:"SYNERGY",a:phases.aSyn,b:phases.bSyn},
  ];
  document.getElementById("phase-rows").innerHTML=phaseList.map(ph=>{
    const t=ph.a+ph.b,pA=Math.round(ph.a/t*100),aW=ph.a>=ph.b;
    return`<div class="phase-row"><div class="phase-label">${ph.label}</div><div style="flex:1">
      <div class="phase-bar"><div class="pb1" style="width:${pA}%"></div><div class="pb2" style="width:${100-pA}%"></div></div>
      <div class="phase-scores"><span class="${aW?"best":""}">${Math.round(ph.a)}</span><span class="${!aW?"best":""}">${Math.round(ph.b)}</span></div>
    </div></div>`;
  }).join("");

  // ── MATCH REPORT
  const eventIcons={goal:"⚽",miss:"❌",save:"🧤",press:"💪",setpiece:"🎯",run:"⚡",header:"👤"};
  const reportHTML=sim.events.map(ev=>{
    const teamCol=ev.team===0?"var(--p1)":"var(--p2)";
    const teamName=ev.team===0?n0:n1;
    let content="";
    if(ev.method==="finish"||ev.method==="run in behind"||ev.method==="header"){
      const goalType=ev.method==="header"?"Header goal":ev.method==="run in behind"?"Goal — Run in behind":"Goal";
      content=`<span class="scorer">${ev.scorer?.name}</span> — ${goalType}${ev.assist?` <span class="assist">(assist: ${ev.assist.name})</span>`:""}
      <span class="detail" style="color:${teamCol}">${teamName}</span>`;
    } else if(ev.method==="miss"){
      content=`<span style="color:var(--amber)">${ev.player?.name}</span> — Big chance missed
      <span class="detail">${ev.note||""}</span>`;
    } else if(ev.method==="save"){
      content=`<span style="color:var(--green)">${ev.player?.name}</span> — Crucial save
      <span class="detail">${ev.note||""}</span>`;
    } else if(ev.method==="press"){
      content=`<span style="color:var(--text)">${ev.player?.name}</span> — Pressing win
      <span class="detail">${ev.note||""}</span>`;
    } else if(ev.method==="setpiece"){
      content=`<span style="color:var(--text)">${ev.player?.name}</span> — Set piece threat
      <span class="detail">${ev.note||""}</span>`;
    }
    const icon=ev.method==="finish"||ev.method==="run in behind"?"⚽":ev.method==="header"?"⚽":eventIcons[ev.method]||"▶";
    return`<div class="minute-event"><div class="min-badge">${ev.min}'</div><div class="event-icon">${icon}</div><div class="event-text">${content}</div></div>`;
  }).join("");

  const motmLine=`<div style="margin-top:10px;padding:10px;background:#0d0d0d;border-radius:6px;border:1px solid var(--border)">
    <span style="font-family:var(--fh);letter-spacing:2px;color:var(--gold);font-size:14px">⭐ MAN OF THE MATCH</span><br/>
    <span style="font-family:var(--fh);font-size:18px;color:#fff">${trueMOTM.player.name}</span>
    <span style="font-family:var(--fh);font-size:18px;color:var(--gold)"> ${trueMOTM.rating}</span>
    <span style="font-size:12px;color:var(--muted);margin-left:6px">${trueMOTM.player.position} · ${trueMOTM.t===0?n0:n1}</span>
  </div>`;
  document.getElementById("match-report").innerHTML=reportHTML+motmLine;

  // ── PLAYER RATINGS TABLE
  function ratingClass(r){if(r>=8.5)return"elite";if(r>=7.5)return"good";if(r>=6.5)return"avg";if(r>=5.5)return"poor";return"bad"}
  function ratingBar(r){
    const pct=clamp(((r-4)/6)*100,0,100);
    const col=r>=8.5?"var(--gold)":r>=7.5?"var(--green)":r>=6.5?"var(--text)":r>=5.5?"var(--amber)":"var(--red)";
    return`<span class="rating-bar-wrap"><span class="rating-bar-fill" style="width:${pct}%;background:${col}"></span></span>`;
  }
  function ratingsTableHTML(ratings,motmName){
    return`<thead><tr><th>POS</th><th>PLAYER</th><th colspan="2">RATING</th></tr></thead><tbody>`+
    ratings.sort((a,b)=>{const order=["gk","lb","cb","rb","cdm","cm","cam","lw","rw","st"];return order.indexOf(a.role)-order.indexOf(b.role)}).map(r=>{
      const isMOTM=r.player.name===motmName;
      return`<tr>
        <td><span class="pos-badge">${r.role.toUpperCase()}</span></td>
        <td>${r.player.name}${isMOTM?`<span class="mom-badge">MOTM</span>`:""}</td>
        <td><span class="rating-num ${ratingClass(r.rating)}">${r.rating.toFixed(1)}</span></td>
        <td>${ratingBar(r.rating)}</td>
      </tr>`;
    }).join("")+"</tbody>";
  }
  document.getElementById("ratings-name1").textContent=n0.toUpperCase();
  document.getElementById("ratings-name2").textContent=n1.toUpperCase();
  document.getElementById("ratings-table1").innerHTML=ratingsTableHTML(ratingsA,trueMOTM.player.name);
  document.getElementById("ratings-table2").innerHTML=ratingsTableHTML(ratingsB,trueMOTM.player.name);

  // ── BATTLES
  document.getElementById("battle-cards").innerHTML=battles.map(b=>`
    <div class="battle-card">
      <div class="battle-title">${b.title}</div>
      <div class="battle-bar"><div class="pb1" style="width:${b.a}%"></div><div class="pb2" style="width:${b.b}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--fh);font-size:12px;color:var(--muted);margin-bottom:5px"><span>${Math.round(b.a)}</span><span>${Math.round(b.b)}</span></div>
      <div class="battle-reason">${b.reason}</div>
      <div class="battle-effect">${b.effect}</div>
    </div>`).join("");

  // ── WEAKNESSES
  document.getElementById("weak-grid").innerHTML=`
    <div class="weak-card p1"><h4>${n0.toUpperCase()} RISKS</h4>${weakA.length?weakA.map(w=>`<div class="weak-item"><span class="wi-label">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>
    <div class="weak-card p2"><h4>${n1.toUpperCase()} RISKS</h4>${weakB.length?weakB.map(w=>`<div class="weak-item"><span class="wi-label">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>`;

  // ── SQUADS
  document.getElementById("squad1-cards").innerHTML=`<h4 class="p1">${n0.toUpperCase()}</h4>`+state.squads[0].map((p,i)=>p?cardHTML(p,LAYOUT[i].slot,false):"").join("");
  document.getElementById("squad2-cards").innerHTML=`<h4 class="p2">${n1.toUpperCase()}</h4>`+state.squads[1].map((p,i)=>p?cardHTML(p,LAYOUT[i].slot,false):"").join("");

  showScreen("result");
}

// ═══════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(`screen-${name}`).classList.add("active");
  window.scrollTo(0,0);
}
function startDraft(){
  const n1=document.getElementById("name1").value.trim()||"Player 1";
  const n2=document.getElementById("name2").value.trim()||"Player 2";
  state=freshState();state.names=[n1,n2];
  document.getElementById("p1-name-head").textContent=n1.toUpperCase();
  document.getElementById("p2-name-head").textContent=n2.toUpperCase();
  showScreen("draft");rebuildPitches();
}
function resetGame(){showScreen("intro")}
document.getElementById("pick-overlay").addEventListener("click",function(e){if(e.target===this)this.classList.remove("open")});
