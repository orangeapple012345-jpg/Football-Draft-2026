<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Draft Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--pitch:#1a6b2e;--pitch2:#155924;
  --dark:#0d0d0d;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;
  --p1:#3b82f6;--p2:#ef4444;--p1bg:#0a1a2e;--p2bg:#1a0a0a;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;
  --fh:'Bebas Neue',sans-serif;--fb:'Barlow Condensed',sans-serif;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--fb);overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── INTRO ── */
#screen-intro{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#152a15,#0d0d0d 70%);text-align:center;gap:22px;padding:40px 20px}
.logo{font-family:var(--fh);font-size:clamp(50px,12vw,92px);letter-spacing:6px;line-height:1;color:var(--gold);text-shadow:0 0 60px rgba(245,200,66,.3)}
.sub{font-size:18px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.name-inputs{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.name-inputs input{background:#111;border:2px solid var(--border);color:var(--text);font-family:var(--fb);font-size:17px;letter-spacing:2px;padding:11px 16px;border-radius:6px;width:200px;text-align:center;transition:border-color .2s}
.name-inputs input:focus{outline:none;border-color:var(--gold)}
.name-inputs input::placeholder{color:#444}
.btn{font-family:var(--fh);font-size:20px;letter-spacing:3px;background:var(--gold);color:#000;border:none;padding:13px 36px;border-radius:6px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,.3)}
.btn.outline{background:transparent;color:var(--gold);border:2px solid var(--gold)}
.pitch-decor{width:min(400px,80vw);height:5px;background:repeating-linear-gradient(90deg,var(--pitch) 0 28px,var(--pitch2) 28px 56px);border-radius:3px}

/* ── DRAFT ── */
#screen-draft{flex-direction:column;height:100vh;overflow:hidden}
.draft-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#0a0a0a;border-bottom:2px solid var(--border);flex-shrink:0;gap:6px;flex-wrap:wrap}
.turn-banner{font-family:var(--fh);font-size:17px;letter-spacing:2px}
.turn-banner.p1{color:var(--p1)}.turn-banner.p2{color:var(--p2)}
.pills{display:flex;gap:5px}
.pill{font-size:10px;letter-spacing:1px;padding:4px 9px;border-radius:4px;font-weight:700}
.pill.p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.pill.p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.draft-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.pitch-panel{flex:1;display:flex;flex-direction:column;min-height:0;border-bottom:2px solid var(--border)}
.pitch-panel:last-child{border-bottom:none}
.pitch-label{font-family:var(--fh);font-size:11px;letter-spacing:3px;padding:3px 8px;flex-shrink:0}
.pitch-panel.p1 .pitch-label{color:var(--p1);background:var(--p1bg)}
.pitch-panel.p2 .pitch-label{color:var(--p2);background:var(--p2bg)}
.pitch-wrap{flex:1;background:repeating-linear-gradient(0deg,transparent 0,transparent 47px,rgba(255,255,255,.04) 47px,rgba(255,255,255,.04) 48px),linear-gradient(180deg,var(--pitch),var(--pitch2));padding:3px 4px;display:flex;align-items:stretch;overflow:hidden}
.fgrid{display:flex;flex-direction:column;gap:2px;width:100%;justify-content:space-evenly}
.frow{display:flex;justify-content:center;gap:2px}
.slt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:50px;height:46px;border-radius:5px;border:1px dashed rgba(255,255,255,.22);background:rgba(0,0,0,.32);cursor:pointer;font-family:var(--fb);color:rgba(255,255,255,.65);font-size:8px;font-weight:600;letter-spacing:.5px;transition:border-color .2s,background .2s,transform .1s;padding:2px;text-align:center;flex-shrink:0}
.slt .plbl{font-family:var(--fh);font-size:12px;letter-spacing:1px;color:#fff;line-height:1}
.slt:hover:not(.filled):not(.locked){border-color:var(--gold);background:rgba(245,200,66,.1);transform:scale(1.07)}
.slt.filled{border-style:solid;border-color:rgba(255,255,255,.18);background:rgba(0,0,0,.48);cursor:default}
.slt.locked{opacity:.35;cursor:not-allowed}
.slt .mface{width:24px;height:24px;border-radius:50%;object-fit:contain;background:#1a1a1a;flex-shrink:0}
.slt .mname{font-size:6px;text-align:center;line-height:1;color:#ccc;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slt .mrat{font-family:var(--fh);font-size:10px;color:var(--gold);line-height:1}

/* ── PICK OVERLAY — FM card swiper ── */
#pick-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 0 0}
#pick-overlay.open{display:flex}
.pick-header{font-family:var(--fh);font-size:22px;letter-spacing:4px;text-align:center;margin-bottom:8px}
.pick-header span{color:var(--gold)}
.card-dots{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.dot.active{background:var(--gold)}
/* swipe container */
.swipe-wrap{flex:1;width:100%;overflow:hidden;position:relative}
.swipe-track{display:flex;height:100%;transition:transform .3s ease;will-change:transform}
.fm-card{flex-shrink:0;width:100vw;height:100%;overflow-y:auto;padding:10px 12px 16px}

/* FM CARD INNER */
.fc-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.fc-photo{width:70px;height:70px;border-radius:8px;object-fit:contain;background:#1a1a1a;flex-shrink:0;border:2px solid var(--border)}
.fc-identity{}
.fc-name{font-family:var(--fh);font-size:22px;letter-spacing:2px;color:#fff;line-height:1;margin-bottom:3px}
.fc-season{font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--gold)}
.fc-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.fc-pos-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.fc-pos-badge{font-family:var(--fh);font-size:11px;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:#1a1a1a;border:1px solid var(--border);color:var(--text)}
.fc-ovr-row{display:flex;gap:8px;margin-bottom:12px}
.fc-ovr-box{flex:1;background:#111;border-radius:6px;padding:8px;text-align:center;border:1px solid var(--border)}
.fc-ovr-box .ovr-num{font-family:var(--fh);font-size:28px;color:var(--gold);line-height:1}
.fc-ovr-box .ovr-lbl{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
/* attribute sections */
.fc-attrs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.attr-section{background:#111;border-radius:6px;padding:8px;border:1px solid var(--border)}
.attr-section-title{font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:6px}
.attr-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #1a1a1a}
.attr-row:last-child{border-bottom:none}
.attr-name{font-size:11px;color:var(--muted)}
.attr-val-wrap{display:flex;align-items:center;gap:5px}
.attr-num{font-family:var(--fh);font-size:13px;min-width:22px;text-align:right}
.attr-bar{width:50px;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.attr-bar-fill{height:100%;border-radius:3px}
/* trait pills */
.fc-traits{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.trait-pill{font-size:10px;letter-spacing:.5px;padding:3px 8px;border-radius:12px;background:#1a2a1a;border:1px solid #2a4a2a;color:var(--green)}
/* pick button */
.pick-btn{width:calc(100% - 24px);margin:0 12px;font-family:var(--fh);font-size:20px;letter-spacing:3px;background:var(--gold);color:#000;border:none;padding:14px;border-radius:8px;cursor:pointer}
/* nav arrows */
.swipe-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;gap:8px;flex-shrink:0}
.nav-arr{font-family:var(--fh);font-size:16px;letter-spacing:2px;background:#1a1a1a;color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:6px;cursor:pointer;flex:1;text-align:center}
.nav-arr:disabled{opacity:.3;cursor:default}
.nav-count{font-family:var(--fh);font-size:16px;letter-spacing:2px;color:var(--muted);flex-shrink:0}
.close-pick{font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px;flex-shrink:0}

/* ── RESULT ── */
#screen-result{align-items:center;background:radial-gradient(ellipse at 50% 0%,#152a15,#0d0d0d 55%);padding:16px 10px;gap:14px;overflow-y:auto}
.res-sec{width:100%;max-width:680px;background:#0f0f0f;border:1px solid var(--border);border-radius:10px;padding:14px}
.res-sec h3{font-family:var(--fh);font-size:17px;letter-spacing:3px;color:var(--gold);margin-bottom:12px}
.result-title{font-family:var(--fh);font-size:clamp(28px,8vw,60px);letter-spacing:6px;color:var(--gold);text-align:center;text-shadow:0 0 40px rgba(245,200,66,.4)}
.result-winner{font-family:var(--fh);font-size:clamp(18px,5vw,38px);letter-spacing:4px;text-align:center}
.result-winner.p1{color:var(--p1)}.result-winner.p2{color:var(--p2)}.result-winner.draw{color:var(--gold)}

/* phase bars */
.phase-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.phase-lbl{font-family:var(--fh);font-size:11px;letter-spacing:1px;color:var(--muted);width:84px;flex-shrink:0;text-align:right}
.phase-bar{flex:1;height:13px;background:#1a1a1a;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--border)}
.pb1{background:var(--p1)}.pb2{background:var(--p2)}
.phase-scores{display:flex;justify-content:space-between;font-family:var(--fh);font-size:12px;color:var(--muted);margin-top:1px;padding:0 1px}
.ps-best{color:var(--gold)}

/* tactical breakdown */
.tac-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tac-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tac-section h4{font-family:var(--fh);font-size:14px;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.tac-section h4 .winner-tag{font-size:11px;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
.wt-p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.wt-p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.wt-draw{background:#1a1a1a;color:var(--muted);border:1px solid var(--border)}
.tac-text{font-size:13px;color:var(--muted);line-height:1.65}
.tac-text strong{color:var(--text)}

/* ratings */
.rat-table{width:100%;border-collapse:collapse}
.rat-table th{font-family:var(--fh);font-size:11px;letter-spacing:1px;color:var(--muted);padding:3px 5px;text-align:left;border-bottom:1px solid var(--border)}
.rat-table td{padding:5px 5px;border-bottom:1px solid #151515;font-size:12px;vertical-align:middle}
.rat-table tr:last-child td{border-bottom:none}
.rnum{font-family:var(--fh);font-size:15px}
.rnum.elite{color:var(--gold)}.rnum.good{color:var(--green)}.rnum.avg{color:var(--text)}.rnum.poor{color:var(--amber)}.rnum.bad{color:var(--red)}
.rbar{display:inline-block;width:52px;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:5px}
.rbar-fill{height:100%;border-radius:3px}
.mom-tag{background:var(--gold);color:#000;font-family:var(--fh);font-size:9px;letter-spacing:1px;padding:2px 5px;border-radius:3px;margin-left:4px}
.goal-tag{background:#1a3a1a;color:var(--green);font-family:var(--fh);font-size:9px;padding:2px 5px;border-radius:3px;margin-left:3px}
.assist-tag{background:#1a1a3a;color:var(--p1);font-family:var(--fh);font-size:9px;padding:2px 5px;border-radius:3px;margin-left:3px}

/* battles */
.battle{background:#0a0a0a;border:1px solid var(--border);border-radius:7px;padding:10px;margin-bottom:7px}
.battle:last-child{margin-bottom:0}
.battle-title{font-family:var(--fh);font-size:13px;letter-spacing:1px;color:var(--gold);margin-bottom:5px}
.battle-bar{height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden;display:flex;margin:4px 0}
.b-reason{font-size:12px;color:var(--muted);line-height:1.5}

/* goals/scorers */
.goal-event{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #151515;align-items:flex-start}
.goal-event:last-child{border-bottom:none}
.gmin{font-family:var(--fh);font-size:13px;color:var(--gold);min-width:32px;flex-shrink:0}
.gicon{font-size:15px;flex-shrink:0}
.gtext{font-size:13px;line-height:1.5}
.gtext .gs{color:var(--gold);font-weight:700}
.gtext .ga{color:var(--green)}
.gtext .gd{font-size:11px;color:var(--muted);display:block;margin-top:1px}

/* weak */
.weak-grid{display:flex;gap:8px;flex-wrap:wrap}
.weak-card{flex:1;min-width:150px;background:#0a0a0a;border-radius:7px;padding:9px;border:1px solid var(--border)}
.weak-card h4{font-family:var(--fh);font-size:12px;letter-spacing:2px;margin-bottom:7px}
.weak-card.p1 h4{color:var(--p1)}.weak-card.p2 h4{color:var(--p2)}
.weak-item{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid #151515;line-height:1.4}
.weak-item:last-child{border-bottom:none}
.wil{color:var(--red);font-weight:700}

/* squads */
.squad-wrap{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.squad-col{flex:1;min-width:140px}
.squad-col h4{font-family:var(--fh);font-size:12px;letter-spacing:2px;margin-bottom:6px;text-align:center}
.squad-col h4.p1{color:var(--p1)}.squad-col h4.p2{color:var(--p2)}
.squad-list{}
.squad-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #151515}
.squad-item:last-child{border-bottom:none}
.si-face{width:28px;height:28px;border-radius:50%;object-fit:contain;background:#1a1a1a;flex-shrink:0}
.si-info{}
.si-name{font-size:12px;color:var(--text);line-height:1.1}
.si-pos{font-family:var(--fh);font-size:10px;color:var(--muted);letter-spacing:1px}
.si-ovr{font-family:var(--fh);font-size:14px;color:var(--gold);margin-left:auto;flex-shrink:0}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gold);color:#000;font-family:var(--fh);font-size:16px;letter-spacing:2px;padding:9px 22px;border-radius:6px;z-index:999;transition:transform .28s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
</style>
</head>
<body>

<!-- INTRO -->
<section id="screen-intro" class="screen active">
  <div class="logo">DRAFT<br/>ZONE</div>
  <div class="sub">Tactical Match Engine</div>
  <div class="pitch-decor"></div>
  <div class="name-inputs">
    <input id="name1" type="text" maxlength="14" placeholder="PLAYER 1"/>
    <input id="name2" type="text" maxlength="14" placeholder="PLAYER 2"/>
  </div>
  <button class="btn" onclick="startDraft()">KICK OFF</button>
</section>

<!-- DRAFT -->
<section id="screen-draft" class="screen">
  <div class="draft-header">
    <div id="turn-banner" class="turn-banner p1">— PLAYER 1'S TURN —</div>
    <div class="pills">
      <div id="pill1" class="pill p1">P1: 0/11</div>
      <div id="pill2" class="pill p2">P2: 0/11</div>
    </div>
  </div>
  <div class="draft-body">
    <div class="pitch-panel p1">
      <div class="pitch-label" id="p1head">PLAYER 1</div>
      <div class="pitch-wrap" id="pitch1"></div>
    </div>
    <div class="pitch-panel p2">
      <div class="pitch-label" id="p2head">PLAYER 2</div>
      <div class="pitch-wrap" id="pitch2"></div>
    </div>
  </div>
</section>

<!-- PICK OVERLAY (FM swiper) -->
<div id="pick-overlay">
  <div class="pick-header">PICK YOUR <span id="pick-lbl">PLAYER</span></div>
  <div class="card-dots" id="card-dots"></div>
  <div class="swipe-wrap" id="swipe-wrap">
    <div class="swipe-track" id="swipe-track"></div>
  </div>
  <div class="swipe-nav">
    <button class="nav-arr" id="nav-prev" onclick="swipeNav(-1)">◀ PREV</button>
    <span class="nav-count" id="nav-count">1 / 5</span>
    <button class="nav-arr" id="nav-next" onclick="swipeNav(1)">NEXT ▶</button>
    <button class="close-pick" onclick="closePick()">✕</button>
  </div>
  <button class="pick-btn" id="pick-btn" onclick="confirmPick()">✓ DRAFT THIS PLAYER</button>
</div>

<!-- RESULT -->
<section id="screen-result" class="screen">
  <div class="result-title">FULL TIME</div>
  <div id="res-winner" class="result-winner"></div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>📊 PHASE BREAKDOWN</h3>
    <div id="phase-rows"></div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>🔍 TACTICAL BREAKDOWN</h3>
    <div id="tac-breakdown"></div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>⚽ GOALSCORERS</h3>
    <div id="goal-events"></div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>🏅 PLAYER RATINGS</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:230px">
        <div id="rname1" style="font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--p1);margin-bottom:6px"></div>
        <table class="rat-table" id="rtable1"></table>
      </div>
      <div style="flex:1;min-width:230px">
        <div id="rname2" style="font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--p2);margin-bottom:6px"></div>
        <table class="rat-table" id="rtable2"></table>
      </div>
    </div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>⚔️ KEY BATTLES</h3>
    <div id="battles"></div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>⚠️ VULNERABILITIES</h3>
    <div class="weak-grid" id="weak-grid"></div>
  </div>

  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>📋 SQUADS</h3>
    <div class="squad-wrap" id="squad-wrap"></div>
  </div>

  <button class="btn" style="margin-top:6px;margin-bottom:28px" onclick="resetGame()">PLAY AGAIN</button>
</section>

<div id="toast"></div>
<script src="players.js"></script>
<script>
// ═══════════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════════
const LAYOUT=[
  {slot:"GK", label:"GK", role:"gk", row:0},
  {slot:"LB", label:"LB", role:"lb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"RB", label:"RB", role:"rb", row:1},
  {slot:"CDM",label:"CDM",role:"cdm",row:3},
  {slot:"CM", label:"CM", role:"cm", row:3},
  {slot:"CAM",label:"CAM",role:"cam",row:3},
  {slot:"LW", label:"LW", role:"lw", row:4},
  {slot:"RW", label:"RW", role:"rw", row:4},
  {slot:"ST", label:"ST", role:"st", row:5},
];

// Position-specific stat weights
const PW={
  gk: {goalkeeperRating:.30,reflexes:.25,commandOfArea:.18,distribution:.12,aerial:.08,physical:.04,intelligence:.03},
  cb: {defensiveAwareness:.22,tackling:.20,aerial:.16,physical:.14,pace:.12,intelligence:.10,positioning:.06},
  lb: {pace:.14,defensiveAwareness:.13,tackling:.12,crossing:.11,workRate:.10,stamina:.10,intelligence:.10,attack:.08,creativity:.07,physical:.05},
  rb: {pace:.14,defensiveAwareness:.13,tackling:.12,crossing:.11,workRate:.10,stamina:.10,intelligence:.10,attack:.08,creativity:.07,physical:.05},
  cdm:{defensiveAwareness:.22,tackling:.20,positioning:.16,physical:.12,intelligence:.12,midfield:.10,workRate:.08},
  cm: {midfield:.18,passing:.16,pressResistance:.14,intelligence:.12,workRate:.11,stamina:.10,technical:.10,creativity:.09},
  cam:{creativity:.20,passing:.18,technical:.14,intelligence:.12,finishing:.11,attack:.10,dribbling:.09,pressResistance:.06},
  lw: {pace:.16,dribbling:.16,attack:.14,creativity:.12,finishing:.11,crossing:.10,transitionThreat:.10,workRate:.07,physical:.04},
  rw: {pace:.16,dribbling:.16,attack:.14,creativity:.12,finishing:.11,crossing:.10,transitionThreat:.10,workRate:.07,physical:.04},
  st: {finishing:.22,positioning:.18,attack:.16,pace:.12,physical:.10,aerial:.09,intelligence:.08,pressResistance:.05},
};

function posScore(p,role){
  const w=PW[role]||{overall:1};
  let s=0;
  for(const[k,v] of Object.entries(w)) s+=(p[k]??p.overall??70)*v;
  // Scale to realistic range — good player in role = 80s, great = 90s
  return Math.round(Math.min(99,s*1.05));
}

function toast(msg,ms=2200){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),ms);
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function avg(...v){const f=v.flat().filter(x=>x!=null&&!isNaN(x));return f.length?f.reduce((a,b)=>a+b,0)/f.length:0}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function rng(lo,hi){return Math.random()*(hi-lo)+lo}
function byRole(sq,r){return LAYOUT.map((s,i)=>s.role===r?sq[i]:null).filter(Boolean)}
function first(sq,r){return byRole(sq,r)[0]||null}

// ── player pool (respects playerGroup) ──
function poolForSlot(slot){
  const draftedGroups=new Set(
    PLAYERS.filter(p=>state.drafted.has(p.name)&&p.playerGroup).map(p=>p.playerGroup)
  );
  let el;
  if(slot==="CDM") el=PLAYERS.filter(p=>p.positions.includes("CDM"));
  else if(slot==="CM") el=PLAYERS.filter(p=>p.positions.includes("CM"));
  else if(slot==="CAM") el=PLAYERS.filter(p=>p.positions.includes("CAM"));
  else el=PLAYERS.filter(p=>p.positions.includes(slot));
  return el.filter(p=>{
    if(state.drafted.has(p.name))return false;
    if(p.playerGroup&&draftedGroups.has(p.playerGroup))return false;
    return true;
  });
}

function buildPitch(idx){
  const el=document.getElementById(`pitch${idx+1}`);
  const mine=state.turn===idx;
  const sq=state.squads[idx];
  const rows={};
  LAYOUT.forEach((s,i)=>{if(!rows[s.row])rows[s.row]=[];rows[s.row].push({sd:s,si:i})});
  let h='<div class="fgrid">';
  Object.keys(rows).sort((a,b)=>+b-+a).forEach(rk=>{
    h+='<div class="frow">';
    rows[rk].forEach(({sd,si})=>{
      const p=sq[si];
      if(p){
        h+=`<div class="slt filled"><img class="mface" src="${p.face}" onerror="this.src='${FB}'"/><div class="mname">${p.name.split("—")[0].split(" ").pop().trim()}</div><div class="mrat">${p.overall}</div></div>`;
      } else if(mine){
        h+=`<button class="slt" onclick="openPick(${idx},${si})"><div class="plbl">${sd.label}</div><div style="font-size:6px;color:var(--muted)">tap</div></button>`;
      } else {
        h+=`<div class="slt locked"><div class="plbl">${sd.label}</div></div>`;
      }
    });
    h+='</div>';
  });
  h+='</div>';el.innerHTML=h;
}
function rebuildPitches(){buildPitch(0);buildPitch(1);updateHeader()}
function updateHeader(){
  const n=state.names[state.turn];
  const b=document.getElementById("turn-banner");
  b.textContent=`— ${n.toUpperCase()}'S TURN —`;
  b.className=`turn-banner p${state.turn+1}`;
  const f0=state.squads[0].filter(Boolean).length,f1=state.squads[1].filter(Boolean).length;
  document.getElementById("pill1").textContent=`${state.names[0].toUpperCase()}: ${f0}/11`;
  document.getElementById("pill2").textContent=`${state.names[1].toUpperCase()}: ${f1}/11`;
}

// ═══════════════════════════════════════════════
//  PICK — FM SWIPER
// ═══════════════════════════════════════════════
function openPick(pi,si){
  if(state.turn!==pi){toast("Not your turn!");return}
  const sd=LAYOUT[si];
  const pool=poolForSlot(sd.slot);
  if(!pool.length){toast("No players left for this slot!");return}
  state.pendingSlot={pi,si};
  swipeCandidates=shuffle(pool).slice(0,5);
  swipeIdx=0;
  document.getElementById("pick-lbl").textContent=sd.label;
  buildSwiper(sd.slot);
  document.getElementById("pick-overlay").classList.add("open");
}

function buildSwiper(slot){
  const track=document.getElementById("swipe-track");
  track.innerHTML=swipeCandidates.map(p=>fmCardHTML(p,slot)).join("");
  track.style.transform=`translateX(0)`;
  buildDots();
  updateSwipeNav();
}

function buildDots(){
  document.getElementById("card-dots").innerHTML=swipeCandidates.map((_,i)=>`<div class="dot${i===swipeIdx?" active":""}"></div>`).join("");
}

function swipeNav(dir){
  swipeIdx=clamp(swipeIdx+dir,0,swipeCandidates.length-1);
  document.getElementById("swipe-track").style.transform=`translateX(-${swipeIdx*100}vw)`;
  buildDots();updateSwipeNav();
}

function updateSwipeNav(){
  document.getElementById("nav-prev").disabled=swipeIdx===0;
  document.getElementById("nav-next").disabled=swipeIdx===swipeCandidates.length-1;
  document.getElementById("nav-count").textContent=`${swipeIdx+1} / ${swipeCandidates.length}`;
}

// Touch swipe
let touchStartX=0;
document.getElementById("swipe-wrap").addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX},{passive:true});
document.getElementById("swipe-wrap").addEventListener("touchend",e=>{
  const dx=touchStartX-e.changedTouches[0].clientX;
  if(Math.abs(dx)>40)swipeNav(dx>0?1:-1);
},{passive:true});

function confirmPick(){
  const p=swipeCandidates[swipeIdx];
  if(!p)return;
  const{pi,si}=state.pendingSlot;
  state.squads[pi][si]=p;
  state.drafted.add(p.name);
  document.getElementById("pick-overlay").classList.remove("open");
  const d1=state.squads[0].every(Boolean),d2=state.squads[1].every(Boolean);
  if(d1&&d2){setTimeout(showResult,350);return}
  const other=1-pi;
  if(state.squads[other].some(s=>s===null))state.turn=other;
  else if(state.squads[pi].some(s=>s===null))state.turn=pi;
  rebuildPitches();
  toast(`${p.name.split("—")[0].trim()} drafted!`);
}

function closePick(){
  document.getElementById("pick-overlay").classList.remove("open");
}

// ═══════════════════════════════════════════════
//  TEAM PROFILE
// ═══════════════════════════════════════════════
function profile(sq){
  const gk=first(sq,"gk"),cbs=byRole(sq,"cb"),lb=first(sq,"lb"),rb=first(sq,"rb");
  const cdm=first(sq,"cdm"),cm=first(sq,"cm"),cam=first(sq,"cam");
  const lw=first(sq,"lw"),rw=first(sq,"rw"),st=first(sq,"st");
  const all=sq.filter(Boolean);
  const s=k=>avg(...all.map(p=>p[k]??0));

  const gkScore=gk?posScore(gk,"gk"):55;
  const cbScore=cbs.length?avg(...cbs.map(c=>posScore(c,"cb"))):55;
  const lbScore=lb?posScore(lb,"lb"):55;
  const rbScore=rb?posScore(rb,"rb"):55;
  const cdmScore=cdm?posScore(cdm,"cdm"):55;
  const cmScore=cm?posScore(cm,"cm"):55;
  const camScore=cam?posScore(cam,"cam"):55;
  const lwScore=lw?posScore(lw,"lw"):55;
  const rwScore=rw?posScore(rw,"rw"):55;
  const stScore=st?posScore(st,"st"):55;

  const cbPace=cbs.length?avg(...cbs.map(c=>c.pace??60)):60;
  const cbAerial=cbs.length?avg(...cbs.map(c=>c.aerial??70)):70;
  const cbDefAware=cbs.length?avg(...cbs.map(c=>c.defensiveAwareness??70)):70;
  const cbTackle=cbs.length?avg(...cbs.map(c=>c.tackling??70)):70;

  const stFinish=st?st.finishing??60:60;
  const stAerial=st?st.aerial??70:70;
  const attackPace=avg(...[lw,rw,st].filter(Boolean).map(p=>p.pace??60));
  const crossing=avg(...[lb,rb,lw,rw,cam].filter(Boolean).map(p=>p.crossing??50));
  const setPieces=avg(...all.map(p=>p.setPieces??50));
  const transitionThreat=avg(...[lw,rw,st].filter(Boolean).map(p=>p.transitionThreat??50));
  const fbAttackRisk=avg(...[lb,rb].filter(Boolean).map(p=>(p.traits||[]).includes("attackingFullback")?p.attack*1.1:(p.attack??50)*0.6));
  const gkRating=gk?avg(gk.goalkeeperRating??70,gk.reflexes??70):55;
  const gkDistrib=gk?gk.distribution??60:60;
  const midPressRes=avg(...[cdm,cm,cam].filter(Boolean).map(p=>p.pressResistance??60));
  const cdmProt=cdm?posScore(cdm,"cdm"):50;

  // playstyle archetype
  const ps=all.flatMap(p=>p.playstyles||[]);
  const countP=x=>ps.filter(y=>y===x).length;
  const archetype=["counterAttack","possession","highPress","direct","wide","organised"].sort((a,b)=>countP(b)-countP(a))[0];

  // synergy
  let syn=0;
  const traits=all.flatMap(p=>p.traits||[]);
  const hasTr=t=>traits.includes(t);
  if((hasTr("crossingSpecialist")||crossing>78)&&stAerial>82)syn+=8;
  if(hasTr("attackingFullback")&&attackPace>84)syn+=6;
  if(countP("highPress")>=4&&midPressRes>82)syn+=7;
  if(countP("counterAttack")>=3&&transitionThreat>82)syn+=6;
  if(s("creativity")>82&&stFinish>88)syn+=6;
  if(countP("possession")>=4&&midPressRes>80)syn+=5;
  if(fbAttackRisk>70&&cdmProt<68)syn-=7;
  if(crossing>80&&stAerial<70)syn-=5;

  return{
    gk,cbs,lb,rb,cdm,cm,cam,lw,rw,st,all,
    gkScore,cbScore,lbScore,rbScore,cdmScore,cmScore,camScore,lwScore,rwScore,stScore,
    cbPace,cbAerial,cbDefAware,cbTackle,stFinish,stAerial,
    attackPace,crossing,setPieces,transitionThreat,fbAttackRisk,
    gkRating,gkDistrib,midPressRes,cdmProt,
    pace:s("pace"),pressing:s("pressing"),workRate:s("workRate"),
    stamina:s("stamina"),intelligence:s("intelligence"),
    creativity:s("creativity"),physical:s("physical"),technical:s("technical"),
    archetype,syn:clamp(syn,-20,20),countP
  };
}

// ═══════════════════════════════════════════════
//  PHASE SCORES — realistic ranges
// ═══════════════════════════════════════════════
function phases(A,B){
  // Attack: based on position scores of attacking players vs opponent defence
  function atk(a,d){
    let s=avg(a.stScore,a.lwScore,a.rwScore,a.camScore);
    // pace advantage vs CB pace (contextual — only if space)
    const pd=clamp(a.attackPace-d.cbPace,-20,20);
    const ctx=clamp((100-d.cbDefAware)/50,.3,.9);
    s+=pd*ctx*0.3;
    s-=clamp(d.intelligence-78,0,15)*0.2;
    s-=clamp(d.cdmProt-65,0,18)*0.18;
    s+=(a.stAerial-d.cbAerial)*0.1;
    s+=clamp(a.stFinish-80,0,18)*0.25;
    s+=clamp(a.creativity-74,0,18)*0.15;
    s-=clamp(d.gkRating-74,0,15)*0.15;
    return clamp(s,50,99); // floor 50 so real teams always look decent
  }
  const aAtk=atk(A,B),bAtk=atk(B,A);

  function mid(a,d){
    let s=avg(a.cdmScore,a.cmScore,a.camScore);
    s+=clamp(a.midPressRes-d.pressing,-15,15)*0.3;
    s+=clamp(a.workRate-70,0,18)*0.18;
    s+=clamp(a.intelligence-78,0,15)*0.16;
    s+=clamp(a.technical-78,0,15)*0.16;
    s+=(a.physical-d.physical)*0.1;
    return clamp(s,50,99);
  }
  const aMid=mid(A,B),bMid=mid(B,A);

  function trans(a,d){
    let s=avg(a.lwScore,a.rwScore,a.stScore)*0.35+a.transitionThreat*0.45;
    const lr=clamp((100-d.cbDefAware)/35,.3,.85);
    const fr=clamp((d.fbAttackRisk-50)/50,.1,.55);
    s*=(0.5+lr*0.28+fr*0.22);
    s-=clamp(d.intelligence-78,0,15)*0.25;
    s-=clamp(d.cdmProt-68,0,16)*0.28;
    s-=clamp(d.cbPace-72,0,18)*0.2;
    s+=clamp(a.attackPace-80,0,18)*0.28;
    return clamp(s,45,99);
  }
  const aTrans=trans(A,B),bTrans=trans(B,A);

  function wide(a,d){
    const lDiff=a.lwScore-d.rbScore;
    const rDiff=a.rwScore-d.lbScore;
    let s=avg(a.lwScore,a.rwScore)*0.5+avg(lDiff,rDiff)*0.3;
    s+=clamp(d.fbAttackRisk-55,0,18)*0.15;
    s+=clamp(a.crossing-72,0,18)*0.16;
    return clamp(s,48,98);
  }
  const aWide=wide(A,B),bWide=wide(B,A);

  function def(p){
    let s=avg(p.cbScore,p.lbScore,p.rbScore)*0.45;
    s+=clamp(p.cdmProt-65,0,22)*0.28;
    s+=clamp(p.gkRating-72,0,18)*0.22;
    s+=clamp(p.intelligence-76,0,15)*0.16;
    s+=clamp(p.cbPace-68,0,18)*0.16;
    s-=clamp(p.fbAttackRisk-65,0,18)*0.18;
    return clamp(s,48,99);
  }
  const aDefStr=def(A),bDefStr=def(B);

  function sp(a,d){
    let s=avg(a.setPieces,a.crossing)*0.5;
    s+=clamp(a.stAerial-70,0,20)*0.26;
    s-=clamp(d.cbAerial-72,0,18)*0.22;
    s-=clamp(d.gkRating-76,0,14)*0.16;
    return clamp(s,48,96);
  }
  const aSP=sp(A,B),bSP=sp(B,A);

  function press(a,d){
    let s=avg(a.pressing,a.workRate,a.stamina)*0.5;
    s+=clamp(a.pressing-d.midPressRes,-15,15)*0.35;
    s-=clamp(d.gkDistrib-76,0,12)*0.16;
    return clamp(s,48,96);
  }
  const aPress=press(A,B),bPress=press(B,A);

  const aSyn=clamp(68+A.syn,48,92),bSyn=clamp(68+B.syn,48,92);
  const aGK=clamp(A.gkRating,48,99),bGK=clamp(B.gkRating,48,99);

  function fin(atk,mid,d,tr,w,sp2,pr,syn,gk){
    return atk*.18+mid*.16+d*.16+tr*.12+w*.10+pr*.08+sp2*.06+gk*.06+syn*.08;
  }
  const aFin=fin(aAtk,aMid,aDefStr,aTrans,aWide,aSP,aPress,aSyn,aGK);
  const bFin=fin(bAtk,bMid,bDefStr,bTrans,bWide,bSP,bPress,bSyn,bGK);

  return{aAtk,bAtk,aMid,bMid,aTrans,bTrans,aWide,bWide,aDefStr,bDefStr,aSP,bSP,aPress,bPress,aSyn,bSyn,aGK,bGK,aFin,bFin};
}

// ═══════════════════════════════════════════════
//  PLAYER RATINGS
// ═══════════════════════════════════════════════
function playerRatings(sqA,sqB,profA,profB,ph){
  function rate(p,role,myPhaseAdv,oppPhaseAdv){
    const base=posScore(p,role);
    // Map pos score (55-99) to rating (5.0-8.5)
    let r=5.0+((base-55)/44)*3.5;
    // Phase context bonus
    r+=myPhaseAdv*0.04;
    // Consistency varies the rating
    const cons=(p.consistency??75)/100;
    const variance=(1-cons)*1.0;
    r+=rng(-variance,variance);
    // Big game float
    const bg=(p.bigGameRating??75)/100;
    r+=rng(-0.25,bg*0.45);
    return clamp(r,4.0,9.9);
  }

  const phAdvA_att=ph.aAtk-ph.bAtk,phAdvA_mid=ph.aMid-ph.bMid,phAdvA_def=ph.aDefStr-ph.bDefStr;
  const phAdvB_att=ph.bAtk-ph.aAtk,phAdvB_mid=ph.bMid-ph.aMid,phAdvB_def=ph.bDefStr-ph.aDefStr;

  function phAdv(role,isA){
    const atk=isA?phAdvA_att:phAdvB_att;
    const mid=isA?phAdvA_mid:phAdvB_mid;
    const def=isA?phAdvA_def:phAdvB_def;
    if(["st","lw","rw"].includes(role))return atk;
    if(["cdm","cm","cam"].includes(role))return mid;
    if(["cb","lb","rb","gk"].includes(role))return def;
    return 0;
  }

  const rA=sqA.map((p,i)=>{
    if(!p)return null;
    const r=LAYOUT[i].role;
    return{p,role:r,rat:Math.round(rate(p,r,phAdv(r,true),phAdv(r,false))*10)/10};
  }).filter(Boolean);
  const rB=sqB.map((p,i)=>{
    if(!p)return null;
    const r=LAYOUT[i].role;
    return{p,role:r,rat:Math.round(rate(p,r,phAdv(r,false),phAdv(r,true))*10)/10};
  }).filter(Boolean);

  return{rA,rB};
}

// ═══════════════════════════════════════════════
//  GOAL SIMULATION
// ═══════════════════════════════════════════════
function simulateGoals(sqA,sqB,profA,profB,ph){
  // XG from attack phase — realistic 0-4 goals range
  const xgA=clamp(((ph.aAtk-60)/38)*2.2+rng(-0.3,0.5),0,5);
  const xgB=clamp(((ph.bAtk-60)/38)*2.2+rng(-0.3,0.5),0,5);
  const gkSaveA=clamp(1-(profB.gkRating-70)/130,0.5,1);
  const gkSaveB=clamp(1-(profA.gkRating-70)/130,0.5,1);
  const goalsA=Math.round(xgA*gkSaveA);
  const goalsB=Math.round(xgB*gkSaveB);

  function pickScorer(sq){
    const att=[...byRole(sq,"st"),...byRole(sq,"lw"),...byRole(sq,"rw"),...byRole(sq,"cam")].filter(Boolean);
    if(!att.length)return sq.filter(Boolean)[0];
    const w=att.map(p=>(p.finishing??60)+(p.positioning??60)+(p.attack??60));
    const tot=w.reduce((a,b)=>a+b,0);
    let r=Math.random()*tot;
    for(let i=0;i<att.length;i++){r-=w[i];if(r<=0)return att[i]}
    return att[0];
  }
  function pickAssist(sq,scorer){
    const prov=[...byRole(sq,"cam"),...byRole(sq,"cm"),...byRole(sq,"lb"),...byRole(sq,"rb"),...byRole(sq,"lw"),...byRole(sq,"rw")].filter(p=>p&&p.name!==scorer?.name);
    if(!prov.length)return null;
    const w=prov.map(p=>(p.passing??60)+(p.crossing??50)+(p.creativity??60));
    const tot=w.reduce((a,b)=>a+b,0);
    let r=Math.random()*tot;
    for(let i=0;i<prov.length;i++){r-=w[i];if(r<=0)return prov[i]}
    return prov[0];
  }

  const usedMins=new Set();
  function uMin(base,spread){
    let m=Math.round(base+rng(-spread,spread));
    m=clamp(m,2,90);
    while(usedMins.has(m))m=m>=90?m-1:m+1;
    usedMins.add(m);return m;
  }

  const events=[];
  for(let i=0;i<goalsA;i++){
    const scorer=pickScorer(sqA);
    const assist=pickAssist(sqA,scorer);
    const min=uMin(18+i*20,14);
    const method=scorer&&scorer.aerial>82&&Math.random()<0.28?"Header":(scorer&&scorer.pace>87&&Math.random()<0.28?"Run in behind":"Finish");
    events.push({min,team:0,scorer,assist,method});
  }
  for(let i=0;i<goalsB;i++){
    const scorer=pickScorer(sqB);
    const assist=pickAssist(sqB,scorer);
    const min=uMin(24+i*20,14);
    const method=scorer&&scorer.aerial>82&&Math.random()<0.28?"Header":(scorer&&scorer.pace>87&&Math.random()<0.28?"Run in behind":"Finish");
    events.push({min,team:1,scorer,assist,method});
  }
  return{goalsA,goalsB,events:events.sort((a,b)=>a.min-b.min)};
}

//  TACTICAL BREAKDOWN TEXT
// ═══════════════════════════════════════════════
function tacBreakdown(A,B,ph,n0,n1){
  const sections=[];

  // Archetype intro
  const archDesc={
    counterAttack:"a fast counter-attacking side that loves to exploit space in behind",
    possession:"a possession-based team that controls tempo and presses high",
    highPress:"a high-intensity pressing outfit that suffocates opponents",
    direct:"a direct, vertical team that gets the ball forward quickly",
    wide:"a wide team that creates from the flanks with crosses and overlaps",
    organised:"a compact, tactically disciplined side that is hard to break down"
  };
  sections.push({
    title:`TACTICAL OVERVIEW`,
    winnerTag:null,
    text:`<strong>${n0}</strong> set up as ${archDesc[A.archetype]||"a balanced side"}. <strong>${n1}</strong> deployed as ${archDesc[B.archetype]||"a balanced side"}. ${A.archetype===B.archetype?"Both teams share a similar philosophy, making the individual battles even more decisive.":A.archetype==="counterAttack"&&B.archetype==="possession"?`The tactical battle is classic counter vs possession — ${n0} need to absorb pressure and strike on the break, while ${n1} must be patient and avoid leaving gaps.`:B.archetype==="counterAttack"&&A.archetype==="possession"?`Classic possession vs counter — ${n0} must keep the ball away from dangerous transitions, ${n1} must be clinical when the opportunity comes.`:`Both styles offer different strengths and the match will be decided by which tactical approach wins out.`}`
  });

  // Attack vs Defence
  const aAtkWins=ph.aAtk>ph.bAtk;
  sections.push({
    title:"ATTACK vs DEFENCE",
    winnerTag:Math.abs(ph.aAtk-ph.bAtk)<3?"DRAW":aAtkWins?n0:n1,
    winnerTeam:Math.abs(ph.aAtk-ph.bAtk)<3?"draw":aAtkWins?"p1":"p2",
    text:`<strong>${n0}</strong> attack score: <strong>${Math.round(ph.aAtk)}</strong>. <strong>${n1}</strong> defence score: <strong>${Math.round(ph.bDefStr)}</strong>.<br>
    ${A.stFinish>88?`${A.st?.name.split("—")[0].trim()||"The striker"} is clinical in front of goal — a constant danger. `:``}${B.cbPace<72&&A.attackPace>84?`${n0}'s pace behind ${n1}'s slower centre-backs is a major threat. `:``}${B.cdmProt>78?`${n1}'s midfield screen does well to protect the backline. `:``}${A.crossing>80&&A.stAerial>82?`${n0} have a dangerous delivery-plus-aerial combination that will test ${n1} from set pieces and wide areas. `:``}${B.gkRating>85?`${n1}'s goalkeeper is excellent and will keep them in the match. `:``}`
  });

  // Midfield
  const aMidWins=ph.aMid>ph.bMid;
  sections.push({
    title:"MIDFIELD BATTLE",
    winnerTag:Math.abs(ph.aMid-ph.bMid)<3?"DRAW":aMidWins?n0:n1,
    winnerTeam:Math.abs(ph.aMid-ph.bMid)<3?"draw":aMidWins?"p1":"p2",
    text:`<strong>${n0}</strong> mid score: <strong>${Math.round(ph.aMid)}</strong> vs <strong>${n1}</strong>: <strong>${Math.round(ph.bMid)}</strong>.<br>
    ${A.midPressRes>85?`${n0} have exceptional press resistance — they will play through pressure comfortably. `:A.midPressRes<68?`${n0} struggle under pressure — ${n1}'s press could cause real problems. `:``}${B.pressing>78?`${n1} press intensely and that could disrupt ${n0}'s build-up. `:``}${A.cdm?`${A.cdm.name.split("—")[0].trim()} screens the backline effectively. `:``}${B.cam?`${B.cam.name.split("—")[0].trim()} is a creative threat between the lines. `:``}`
  });

  // Wide battle
  const aWideWins=ph.aWide>ph.bWide;
  sections.push({
    title:"WIDE PLAY",
    winnerTag:Math.abs(ph.aWide-ph.bWide)<3?"DRAW":aWideWins?n0:n1,
    winnerTeam:Math.abs(ph.aWide-ph.bWide)<3?"draw":aWideWins?"p1":"p2",
    text:`${A.lw?`<strong>${A.lw.name.split("—")[0].trim()}</strong> on the left faces ${B.rb?`<strong>${B.rb.name.split("—")[0].trim()}</strong> at right back`:"an unspecified right back"}. `:""}${A.rw?`<strong>${A.rw.name.split("—")[0].trim()}</strong> on the right faces ${B.lb?`<strong>${B.lb.name.split("—")[0].trim()}</strong> at left back`:"an unspecified left back"}. `:""}${A.lwScore-B.rbScore>8?`${n0}'s left flank looks particularly dangerous. `:``}${A.rwScore-B.lbScore>8?`${n0}'s right side creates consistent problems. `:``}${B.fbAttackRisk>70?`${n1}'s attacking fullbacks push high — potentially leaving space for ${n0} to exploit on the break. `:``}${A.crossing>80?`${n0} deliver dangerous balls into the box from wide areas. `:``}`
  });

  // Transition
  const aTransWins=ph.aTrans>ph.bTrans;
  sections.push({
    title:"TRANSITION & PACE",
    winnerTag:Math.abs(ph.aTrans-ph.bTrans)<3?"DRAW":aTransWins?n0:n1,
    winnerTeam:Math.abs(ph.aTrans-ph.bTrans)<3?"draw":aTransWins?"p1":"p2",
    text:`Transition score: <strong>${n0} ${Math.round(ph.aTrans)}</strong> vs <strong>${n1} ${Math.round(ph.bTrans)}</strong>.<br>
    ${A.attackPace>88?`${n0} have electrifying pace in attack — a constant threat on the break. `:``}${B.cbPace<70&&A.transitionThreat>80?`${n1}'s slower centre-backs are particularly vulnerable to balls played in behind. `:``}${B.cdmProt>80?`${n1}'s defensive midfield protection limits transition opportunities. `:``}${A.archetype==="counterAttack"?`${n0}'s counter-attacking style makes them most dangerous when ${n1} push forward. `:``}`
  });

  // Defence
  const aDefWins=ph.aDefStr>ph.bDefStr;
  sections.push({
    title:"DEFENSIVE STRUCTURE",
    winnerTag:Math.abs(ph.aDefStr-ph.bDefStr)<3?"DRAW":aDefWins?n0:n1,
    winnerTeam:Math.abs(ph.aDefStr-ph.bDefStr)<3?"draw":aDefWins?"p1":"p2",
    text:`Defensive solidity: <strong>${n0} ${Math.round(ph.aDefStr)}</strong> vs <strong>${n1} ${Math.round(ph.bDefStr)}</strong>.<br>
    ${A.cbs.length?`${n0}'s centre-back pairing — <strong>${A.cbs.map(c=>c.name.split("—")[0].trim()).join(" & ")}</strong> — ${A.cbScore>82?"are a formidable partnership.":"are tested by a strong opposition attack."} `:``}${A.cbAerial>85?`Dominant in the air — set pieces at the other end will be well defended. `:``}${A.gkRating>86?`${A.gk?.name.split("—")[0].trim()||"The goalkeeper"} is exceptional and a real shot-stopper. `:``}${A.fbAttackRisk>70&&A.cdmProt<68?`However, ${n0}'s attacking fullbacks leave them exposed on the counter-attack. `:``}`
  });

  return sections;
}

// ═══════════════════════════════════════════════
//  BATTLES
// ═══════════════════════════════════════════════
function calcBattles(sqA,sqB,pA,pB){
  const battles=[];
  const ps=(p,r)=>posScore(p,r);

  const st1=first(sqA,"st"),cbs2=byRole(sqB,"cb");
  if(st1&&cbs2.length){
    const sv=ps(st1,"st"),dv=avg(...cbs2.map(c=>ps(c,"cb")));
    const d=sv-dv;
    battles.push({
      title:`${st1.name.split("—")[0].trim()} vs ${cbs2.map(c=>c.name.split("—")[0].trim()).join(" & ")}`,
      a:clamp(50+d*.55,20,80),b:clamp(50-d*.55,20,80),
      reason:d>7?`${st1.name.split("—")[0].trim()} bullies the backline. Movement, pace and finishing give him a decisive edge.`:d<-7?`${cbs2.map(c=>c.name.split("—")[0].trim()).join(" & ")} handle the threat superbly — physical dominance and clever positioning.`:`An even duel. The striker finds moments but the defenders stand firm.`
    });
  }
  const lw1=first(sqA,"lw"),rb2=first(sqB,"rb");
  if(lw1&&rb2){
    const d=ps(lw1,"lw")-ps(rb2,"rb");
    battles.push({
      title:`${lw1.name.split("—")[0].trim()} vs ${rb2.name.split("—")[0].trim()}`,
      a:clamp(50+d*.55,20,80),b:clamp(50-d*.55,20,80),
      reason:d>7?`${lw1.name.split("—")[0].trim()} is devastating — the right back can't handle the pace and dribbling.`:d<-7?`${rb2.name.split("—")[0].trim()} is superb defensively. ${lw1.name.split("—")[0].trim()} barely gets a touch.`:`Competitive duel. Both players have moments. The flank is contested.`
    });
  }
  const rw1=first(sqA,"rw"),lb2=first(sqB,"lb");
  if(rw1&&lb2){
    const d=ps(rw1,"rw")-ps(lb2,"lb");
    battles.push({
      title:`${rw1.name.split("—")[0].trim()} vs ${lb2.name.split("—")[0].trim()}`,
      a:clamp(50+d*.55,20,80),b:clamp(50-d*.55,20,80),
      reason:d>7?`${rw1.name.split("—")[0].trim()} causes havoc on the right.`:d<-7?`${lb2.name.split("—")[0].trim()} is brilliant — shuts out the winger completely.`:`Evenly fought on the right flank — neither side gains clear advantage.`
    });
  }
  const cdm1=first(sqA,"cdm"),cam2=first(sqB,"cam");
  if(cdm1&&cam2){
    const d=ps(cdm1,"cdm")-ps(cam2,"cam");
    battles.push({
      title:`${cdm1.name.split("—")[0].trim()} screens vs ${cam2.name.split("—")[0].trim()}`,
      a:clamp(50+d*.55,20,80),b:clamp(50-d*.55,20,80),
      reason:d>6?`${cdm1.name.split("—")[0].trim()}'s positioning and intelligence cuts off the creative supply.`:d<-6?`${cam2.name.split("—")[0].trim()} finds space between the lines and causes constant problems.`:`Central battle is tightly fought — both players cancel each other out.`
    });
  }
  const gk1=first(sqA,"gk"),gk2=first(sqB,"gk");
  if(gk1&&gk2){
    const d=ps(gk1,"gk")-ps(gk2,"gk");
    battles.push({
      title:`${gk1.name.split("—")[0].trim()} vs ${gk2.name.split("—")[0].trim()}`,
      a:clamp(50+d*.55,20,80),b:clamp(50-d*.55,20,80),
      reason:d>6?`${gk1.name.split("—")[0].trim()} is the superior keeper — crucial saves are expected.`:d<-6?`${gk2.name.split("—")[0].trim()} edges the GK battle — match-winning saves likely.`:`Both keepers are quality. The match could go either way.`
    });
  }
  return battles;
}

// ═══════════════════════════════════════════════
//  WEAKNESSES
// ═══════════════════════════════════════════════
function weaknesses(p,opp){
  const w=[];
  if(p.cbPace<72&&opp.attackPace>82)w.push({label:"Slow CB pace",detail:`Opponent attack pace ${Math.round(opp.attackPace)} vs CB pace ${Math.round(p.cbPace)} — balls in behind are dangerous.`});
  if(p.cdmProt<65&&opp.transitionThreat>78)w.push({label:"Weak CDM screen",detail:"The midfield doesn't screen enough — quick transitions are a real danger."});
  if(p.midPressRes<68&&opp.pressing>76)w.push({label:"Poor press resistance",detail:"Will struggle to build out under intense pressing."});
  if(p.cbAerial<74&&(opp.crossing>78||opp.setPieces>78))w.push({label:"Aerial weakness",detail:"Vulnerable to crosses and set pieces."});
  if(p.fbAttackRisk>72&&p.cdmProt<70)w.push({label:"Exposed on counter",detail:"Attacking fullbacks push high without enough CDM protection."});
  if(p.gkRating<72)w.push({label:"GK below par",detail:"Could cost crucial saves at decisive moments."});
  if(p.stFinish<68)w.push({label:"Lack of clinical finishing",detail:"Chances created but may not be taken consistently."});
  if(p.crossing>80&&p.stAerial<70)w.push({label:"Crossing without aerial target",detail:"Great delivery, but no dominant aerial presence to attack it."});
  return w;
}

  const goals=simulateGoals(state.squads[0],state.squads[1],pA,pB,ph);
  const battles=calcBattles(state.squads[0],state.squads[1],pA,pB);
  const wkA=weaknesses(pA,pB),wkB=weaknesses(pB,pA);

  // Boost scorers/assisters
  goals.events.forEach(ev=>{
    const rats=ev.team===0?rA:rB;
    if(ev.scorer){const r=rats.find(x=>x.p.name===ev.scorer.name);if(r)r.rat=Math.min(9.9,r.rat+rng(.3,.8));}
    if(ev.assist){const r=rats.find(x=>x.p.name===ev.assist.name);if(r)r.rat=Math.min(9.9,r.rat+rng(.2,.5));}
  });

  // PHASE BARS
  const phList=[

    {l:"TRANSITION",a:ph.aTrans,b:ph.bTrans},
    {l:"WIDE",a:ph.aWide,b:ph.bWide},
    {l:"PRESSING",a:ph.aPress,b:ph.bPress},
    {l:"SET PIECES",a:ph.aSP,b:ph.bSP},

    </div></div>`;
  }).join("");

  // TACTICAL BREAKDOWN
  const tac=tacBreakdown(pA,pB,ph,n0,n1);
  document.getElementById("tac-breakdown").innerHTML=tac.map(s=>`
    <div class="tac-section">
      <h4>${s.title}${s.winnerTag?`<span class="winner-tag ${s.winnerTeam==="draw"?"wt-draw":s.winnerTeam==="p1"?"wt-p1":"wt-p2"}">${s.winnerTag}</span>`:""}

      <div class="tac-text">${s.text}</div>

    const col=ev.team===0?"var(--p1)":"var(--p2)";
    const tName=ev.team===0?n0:n1;
    return`<div class="goal-event">
      <div class="gmin">${ev.min}'</div>
      <div class="gicon">⚽</div>
      <div class="gtext">
        <span class="gs">${ev.scorer?.name.split("—")[0].trim()||"?"}</span>
        ${ev.assist?`<span class="ga"> (${ev.assist.name.split("—")[0].trim()})</span>`:""}
        <span class="gd" style="color:${col}">${tName} · ${ev.method}</span>
      </div>
    </div>`;
  }).join(""):`<div style="color:var(--muted);font-size:13px;padding:8px 0">A goalless draw — tight and tense throughout.</div>`;
  const motmHTML=`<div style="margin-top:12px;padding:10px;background:#0a0a0a;border-radius:6px;border:1px solid var(--border)">
    <span style="font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--gold)">⭐ MAN OF THE MATCH</span><br/>
    <span style="font-family:var(--fh);font-size:18px;color:#fff">${motm.p.name.split("—")[0].trim()}</span>

    <span style="font-size:12px;color:var(--muted);margin-left:5px">${motm.role.toUpperCase()} · ${motm.t===0?n0:n1}</span>
  </div>`;
  document.getElementById("goal-events").innerHTML=goalHTML+motmHTML;

  function ratingClass(r){if(r>=8.5)return"elite";if(r>=7.5)return"good";if(r>=6.5)return"avg";if(r>=5.5)return"poor";return"bad"}
  function rBar(r){
    const pct=clamp(((r-4)/6)*100,0,100);
    const col=r>=8.5?"var(--gold)":r>=7.5?"var(--green)":r>=6.5?"var(--text)":r>=5.5?"var(--amber)":"var(--red)";
    return`<span class="rbar"><span class="rbar-fill" style="width:${pct}%;background:${col}"></span></span>`;
  }
  function ratTable(rats,motmName,gEvents,teamIdx){
    const order=["gk","lb","cb","rb","cdm","cm","cam","lw","rw","st"];
    const scorer=new Set(gEvents.filter(e=>e.team===teamIdx&&e.scorer).map(e=>e.scorer.name));
    const assisters=new Set(gEvents.filter(e=>e.team===teamIdx&&e.assist).map(e=>e.assist.name));
    return`<thead><tr><th>POS</th><th>PLAYER</th><th colspan="2">RATING</th></tr></thead><tbody>`+
    rats.sort((a,b)=>order.indexOf(a.role)-order.indexOf(b.role)).map(r=>{
      const isMOTM=r.p.name===motmName;
      const isScorer=scorer.has(r.p.name);
      const isAssister=assisters.has(r.p.name);
      const shortName=r.p.name.split("—")[0].trim().split(" ").slice(-1)[0];
      return`<tr>
        <td style="font-family:var(--fh);font-size:10px;color:var(--muted);letter-spacing:1px">${r.role.toUpperCase()}</td>
        <td style="font-size:12px">${shortName}${isMOTM?`<span class="mom-tag">MOTM</span>`:""}${isScorer?`<span class="goal-tag">⚽</span>`:""}${isAssister?`<span class="assist-tag">🅰</span>`:""}</td>
        <td><span class="rnum ${ratingClass(r.rat)}">${r.rat.toFixed(1)}</span></td>
        <td>${rBar(r.rat)}</td>
      </tr>`;
    }).join("")+"</tbody>";
  }
  document.getElementById("rname1").textContent=n0.toUpperCase();
  document.getElementById("rname2").textContent=n1.toUpperCase();
  document.getElementById("rtable1").innerHTML=ratTable(rA,motm.p.name,goals.events,0);
  document.getElementById("rtable2").innerHTML=ratTable(rB,motm.p.name,goals.events,1);

  // BATTLES
  document.getElementById("battles").innerHTML=battles.map(b=>`
    <div class="battle">
      <div class="battle-title">${b.title}</div>
      <div class="battle-bar"><div class="pb1" style="width:${b.a}%"></div><div class="pb2" style="width:${b.b}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:var(--fh);font-size:11px;color:var(--muted);margin-bottom:4px"><span>${Math.round(b.a)}</span><span>${Math.round(b.b)}</span></div>
      <div class="b-reason">${b.reason}</div>
    </div>`).join("");

  // WEAKNESSES
  document.getElementById("weak-grid").innerHTML=`
    <div class="weak-card p1"><h4>${n0.toUpperCase()} RISKS</h4>${wkA.length?wkA.map(w=>`<div class="weak-item"><span class="wil">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>
    <div class="weak-card p2"><h4>${n1.toUpperCase()} RISKS</h4>${wkB.length?wkB.map(w=>`<div class="weak-item"><span class="wil">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>`;

  // SQUADS
  const sqHtml=(sq,name,cls)=>`<div class="squad-col">
    <h4 class="${cls}">${name.toUpperCase()}</h4>
    <div class="squad-list">
    ${LAYOUT.map((l,i)=>{const p=sq[i];if(!p)return"";return`<div class="squad-item">
      <img class="si-face" src="${p.face}" onerror="this.src='${FB}'"/>
      <div class="si-info"><div class="si-name">${p.name.split("—")[0].trim()}</div><div class="si-pos">${l.slot}${p.name.includes("—")?" · "+p.name.split("—")[1].trim():""}</div></div>
      <div class="si-ovr">${p.overall}</div>
    </div>`}).join("")}
    </div></div>`;
  document.getElementById("squad-wrap").innerHTML=sqHtml(state.squads[0],n0,"p1")+sqHtml(state.squads[1],n1,"p2");

  showScreen("result");
}

// ═══════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(`screen-${name}`).classList.add("active");
  window.scrollTo(0,0);
}
function startDraft(){
  const n1=document.getElementById("name1").value.trim()||"Player 1";
  const n2=document.getElementById("name2").value.trim()||"Player 2";
  state=freshState();state.names=[n1,n2];
  document.getElementById("p1head").textContent=n1.toUpperCase();
  document.getElementById("p2head").textContent=n2.toUpperCase();
  showScreen("draft");rebuildPitches();
}
function resetGame(){showScreen("intro")}
</script>
