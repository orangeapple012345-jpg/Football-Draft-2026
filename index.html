<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:   #f5c842;
  --pitch:  #1a6b2e;
  --pitch2: #155924;
  --dark:   #0d0d0d;
  --border: #2a2a2a;
  --text:   #e8e8e8;
  --muted:  #888;
  --p1:     #3b82f6;
  --p2:     #ef4444;
  --p1bg:   #0f2340;
  --p2bg:   #2a0a0a;
  --font-h: 'Bebas Neue', sans-serif;
  --font-b: 'Barlow Condensed', sans-serif;
}
html, body {
  height: 100%;
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 16px;
  overflow-x: hidden;
}

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* INTRO */
#screen-intro {
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, #1a3a1a 0%, #0d0d0d 70%);
  text-align: center;
  gap: 28px;
  padding: 40px 20px;
}
#screen-intro .logo {
  font-family: var(--font-h);
  font-size: clamp(52px, 10vw, 96px);
  letter-spacing: 6px;
  line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 60px rgba(245,200,66,.35);
}
#screen-intro .sub { font-size: 22px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
.name-inputs { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.name-inputs input {
  background: #1a1a1a;
  border: 2px solid var(--border);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 18px;
  letter-spacing: 2px;
  padding: 12px 20px;
  border-radius: 6px;
  width: 220px;
  text-align: center;
  transition: border-color .2s;
}
.name-inputs input:focus { outline: none; border-color: var(--gold); }
.name-inputs input::placeholder { color: #555; }
.btn {
  font-family: var(--font-h);
  font-size: 22px;
  letter-spacing: 3px;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 14px 40px;
  border-radius: 6px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,.3); }
.btn:active { transform: none; }
.pitch-decor {
  width: min(500px, 90vw);
  height: 6px;
  background: repeating-linear-gradient(90deg, var(--pitch) 0 30px, var(--pitch2) 30px 60px);
  border-radius: 3px;
}

/* DRAFT */
#screen-draft { flex-direction: column; height: 100vh; overflow: hidden; }
.draft-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: #111;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
  flex-wrap: wrap;
}
.turn-banner { font-family: var(--font-h); font-size: 18px; letter-spacing: 3px; }
.turn-banner.p1 { color: var(--p1); }
.turn-banner.p2 { color: var(--p2); }
.draft-teams { display: flex; gap: 6px; }
.team-pill { font-size: 11px; letter-spacing: 1px; padding: 4px 10px; border-radius: 4px; font-weight: 700; }
.team-pill.p1 { background: var(--p1bg); color: var(--p1); border: 1px solid var(--p1); }
.team-pill.p2 { background: var(--p2bg); color: var(--p2); border: 1px solid var(--p2); }

.draft-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.pitch-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; border-bottom: 2px solid var(--border); }
.pitch-panel:last-child { border-bottom: none; }
.pitch-label { font-family: var(--font-h); font-size: 12px; letter-spacing: 3px; padding: 3px 10px; flex-shrink: 0; }
.pitch-panel.p1 .pitch-label { color: var(--p1); background: var(--p1bg); }
.pitch-panel.p2 .pitch-label { color: var(--p2); background: var(--p2bg); }
.pitch-wrap {
  flex: 1;
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 49px, rgba(255,255,255,.04) 49px, rgba(255,255,255,.04) 50px),
    linear-gradient(180deg, var(--pitch) 0%, var(--pitch2) 100%);
  padding: 4px 6px;
  display: flex;
  align-items: stretch;
  overflow: hidden;
}
.formation-grid { display: flex; flex-direction: column; gap: 3px; width: 100%; justify-content: space-evenly; }
.row { display: flex; justify-content: center; gap: 3px; }

.slot-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  width: 52px;
  height: 48px;
  border-radius: 6px;
  border: 1px dashed rgba(255,255,255,.25);
  background: rgba(0,0,0,.35);
  cursor: pointer;
  font-family: var(--font-b);
  color: rgba(255,255,255,.7);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1px;
  transition: border-color .2s, background .2s, transform .1s;
  padding: 2px;
  text-align: center;
  flex-shrink: 0;
}
.slot-btn .pos-label { font-family: var(--font-h); font-size: 13px; letter-spacing: 1px; color: #fff; line-height: 1; }
.slot-btn:hover:not(.filled):not(.locked) { border-color: var(--gold); background: rgba(245,200,66,.12); transform: scale(1.06); }
.slot-btn.filled { border-style: solid; border-color: rgba(255,255,255,.2); background: rgba(0,0,0,.5); cursor: default; }
.slot-btn.locked { opacity: .38; cursor: not-allowed; }
.slot-btn .mini-face { width: 26px; height: 26px; border-radius: 50%; object-fit: contain; background: #222; flex-shrink: 0; }
.slot-btn .mini-name { font-size: 7px; text-align: center; line-height: 1; color: #ddd; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.slot-btn .mini-rat { font-family: var(--font-h); font-size: 11px; color: var(--gold); line-height: 1; }

/* PICK OVERLAY */
#pick-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.92); z-index: 100;
  align-items: center; justify-content: center; padding: 8px 4px;
}
#pick-overlay.open { display: flex; }
.pick-modal {
  background: #161616; border: 1px solid var(--border);
  border-radius: 12px; width: 100%; max-width: 680px; padding: 12px 6px 14px;
}
.pick-modal h2 { font-family: var(--font-h); font-size: 20px; letter-spacing: 3px; margin-bottom: 10px; text-align: center; }
.pick-modal h2 span { color: var(--gold); }
.card-grid { display: flex; flex-wrap: nowrap; gap: 4px; justify-content: center; padding: 0 4px; overflow-x: auto; }

/* FIFA CARD */
.fifa-card {
  width: calc(19vw - 4px); max-width: 118px; min-width: 56px;
  border-radius: 10px; padding: 8px 6px 10px;
  cursor: pointer; position: relative;
  transition: transform .2s, box-shadow .2s;
  user-select: none; flex-shrink: 0;
}
.fifa-card.gold    { background: linear-gradient(145deg, #5a4200 0%, #c8932a 40%, #f5c842 60%, #c8932a 100%); }
.fifa-card.silver  { background: linear-gradient(145deg, #3a3f4a 0%, #8a9099 40%, #c0c8d4 60%, #8a9099 100%); }
.fifa-card.bronze  { background: linear-gradient(145deg, #4a2800 0%, #a05a1a 40%, #cd7f32 60%, #a05a1a 100%); }
.fifa-card.special { background: linear-gradient(145deg, #0a2a3a 0%, #0f4a6a 35%, #7fecff 55%, #0f4a6a 80%, #0a2a3a 100%); }
.fifa-card:hover   { transform: translateY(-5px) scale(1.03); box-shadow: 0 14px 36px rgba(0,0,0,.7); }
.fifa-card:hover.gold    { box-shadow: 0 14px 36px rgba(245,200,66,.4); }
.fifa-card:hover.special { box-shadow: 0 14px 36px rgba(127,236,255,.4); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.card-ovr { font-family: var(--font-h); font-size: clamp(13px, 3.8vw, 22px); line-height: 1; color: #1a1000; }
.card-ovr-special { color: #001a22; }
.card-pos { font-family: var(--font-h); font-size: clamp(7px, 2vw, 11px); letter-spacing: 1px; color: #1a1000; line-height: 1.2; }
.card-pos-special { color: #001a22; }
.card-face-wrap { width: 100%; aspect-ratio: 1; border-radius: 5px; overflow: hidden; background: rgba(0,0,0,.2); margin-bottom: 6px; }
.card-face-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
.card-name { font-family: var(--font-h); font-size: clamp(7px, 2.2vw, 12px); letter-spacing: .5px; text-align: center; color: #1a1000; margin-bottom: 4px; line-height: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-name-special { color: #001a22; }
.card-divider { height: 1px; background: rgba(0,0,0,.2); margin-bottom: 4px; }
.card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px 2px; text-align: center; }
.card-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-val { font-family: var(--font-h); font-size: clamp(8px, 2.6vw, 14px); color: #1a1000; }
.stat-val-special { color: #001a22; }
.stat-lbl { font-size: 7px; font-weight: 700; letter-spacing: .5px; color: rgba(26,16,0,.65); text-transform: uppercase; }
.stat-lbl-special { color: rgba(0,26,34,.65); }
.card-nation { text-align: center; font-size: 8px; letter-spacing: .5px; margin-top: 4px; color: rgba(26,16,0,.55); text-transform: uppercase; }
.card-nation-special { color: rgba(0,26,34,.55); }

/* RESULT */
#screen-result {
  align-items: center; justify-content: flex-start;
  background: radial-gradient(ellipse at 50% 0%, #1a3a1a 0%, #0d0d0d 60%);
  padding: 32px 20px; gap: 24px; overflow-y: auto;
}
.result-title { font-family: var(--font-h); font-size: clamp(36px, 8vw, 72px); letter-spacing: 6px; color: var(--gold); text-align: center; text-shadow: 0 0 40px rgba(245,200,66,.4); }
.result-winner-name { font-family: var(--font-h); font-size: clamp(26px, 5vw, 48px); letter-spacing: 4px; text-align: center; }
.result-winner-name.p1 { color: var(--p1); }
.result-winner-name.p2 { color: var(--p2); }
.result-winner-name.draw { color: var(--gold); }
.scoreboard { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 800px; }
.score-card { flex: 1; min-width: 220px; background: #111; border: 2px solid var(--border); border-radius: 10px; padding: 18px; }
.score-card.p1 { border-color: var(--p1); }
.score-card.p2 { border-color: var(--p2); }
.score-card h3 { font-family: var(--font-h); font-size: 22px; letter-spacing: 3px; margin-bottom: 12px; }
.score-card.p1 h3 { color: var(--p1); }
.score-card.p2 h3 { color: var(--p2); }
.score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.score-row .label { font-size: 14px; color: var(--muted); letter-spacing: 1px; }
.score-row .value { font-family: var(--font-h); font-size: 24px; color: var(--gold); }
.score-row .value.best { color: #4ade80; }
.total-score { font-family: var(--font-h); font-size: 42px; text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); color: #fff; }
.team-cards-wrap { width: 100%; max-width: 1100px; }
.team-cards-wrap h4 { font-family: var(--font-h); font-size: 18px; letter-spacing: 3px; margin-bottom: 10px; text-align: center; color: var(--muted); }
.mini-squad { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.mini-squad .fifa-card { width: 100px; cursor: default; transform: none !important; }

#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--gold); color: #000;
  font-family: var(--font-h); font-size: 17px; letter-spacing: 2px;
  padding: 10px 24px; border-radius: 6px;
  z-index: 999; transition: transform .3s; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0d0d0d; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<!-- INTRO -->
<section id="screen-intro" class="screen active">
  <div class="logo">DRAFT<br/>ZONE</div>
  <div class="sub">4 · 3 · 3 &nbsp;·&nbsp; Football Draft</div>
  <div class="pitch-decor"></div>
  <div class="name-inputs">
    <input id="name1" type="text" maxlength="16" placeholder="PLAYER 1 NAME" />
    <input id="name2" type="text" maxlength="16" placeholder="PLAYER 2 NAME" />
  </div>
  <button class="btn" onclick="startDraft()">KICK OFF</button>
</section>

<!-- DRAFT -->
<section id="screen-draft" class="screen">
  <div class="draft-header">
    <div id="turn-banner" class="turn-banner p1">— PLAYER 1'S TURN —</div>
    <div class="draft-teams">
      <div id="pill1" class="team-pill p1">P1: 0/11</div>
      <div id="pill2" class="team-pill p2">P2: 0/11</div>
    </div>
  </div>
  <div class="draft-body">
    <div class="pitch-panel p1">
      <div class="pitch-label" id="p1-name-head">PLAYER 1</div>
      <div class="pitch-wrap" id="pitch1"></div>
    </div>
    <div class="pitch-panel p2">
      <div class="pitch-label" id="p2-name-head">PLAYER 2</div>
      <div class="pitch-wrap" id="pitch2"></div>
    </div>
  </div>
</section>

<!-- PICK OVERLAY -->
<div id="pick-overlay">
  <div class="pick-modal">
    <h2>PICK YOUR <span id="pick-pos-label">PLAYER</span></h2>
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<!-- RESULT -->
<section id="screen-result" class="screen">
  <div class="result-title">FULL TIME</div>
  <div id="result-winner" class="result-winner-name"></div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="team-cards-wrap">
    <h4>SQUADS</h4>
    <div style="display:flex;gap:28px;flex-wrap:wrap;justify-content:center;">
      <div>
        <h4 id="squad1-title" style="color:var(--p1);margin-bottom:8px;">PLAYER 1</h4>
        <div class="mini-squad" id="squad1-cards"></div>
      </div>
      <div>
        <h4 id="squad2-title" style="color:var(--p2);margin-bottom:8px;">PLAYER 2</h4>
        <div class="mini-squad" id="squad2-cards"></div>
      </div>
    </div>
  </div>
  <button class="btn" style="margin-top:8px" onclick="resetGame()">PLAY AGAIN</button>
</section>

<div id="toast"></div>
<script src="players.js"></script>
<script>
// ── 4-3-3 LAYOUT — 11 players ────────────────────────────────────────────
//
// Row 5 = ST  (top)
// Row 4 = LW, CAM, RW
// Row 3 = CDM, CM, CAM  ← three distinct mid slots
// Row 1 = LB, CB, CB, RB
// Row 0 = GK  (bottom)
//
// slot      = which position pool to draw from
// contributes:
//   "defense"  → def only
//   "both_dm"  → def + mid  (CDM)
//   "midfield" → mid only   (CM)
//   "both_cam" → mid + att  (CAM, LW, RW)
//   "attack"   → att only   (ST)
//
// A player appears in a slot if their positions[] includes that slot value.
// CDM players can appear in the CDM slot AND the CM slot (and vice versa if listed).

const LAYOUT = [
  // GK
  { slot:"GK",  label:"GK",  contributes:"defense",  row:0 },
  // Defence — left to right: LB CB CB RB
  { slot:"LB",  label:"LB",  contributes:"both_dm",  row:1 },
  { slot:"CB",  label:"CB",  contributes:"defense",  row:1 },
  { slot:"CB",  label:"CB",  contributes:"defense",  row:1 },
  { slot:"RB",  label:"RB",  contributes:"both_dm",  row:1 },
  // Midfield — CDM (def+mid), CM (mid only), CAM (mid+att)
  { slot:"CDM", label:"CDM", contributes:"both_dm",  row:3 },
  { slot:"CM",  label:"CM",  contributes:"midfield", row:3 },
  { slot:"CAM", label:"CAM", contributes:"both_cam", row:3 },
  // Attack — LW left, RW right, ST top
  { slot:"LW",  label:"LW",  contributes:"both_cam", row:4 },
  { slot:"RW",  label:"RW",  contributes:"both_cam", row:4 },
  { slot:"ST",  label:"ST",  contributes:"attack",   row:5 },
];

// Pool rules per slot:
// CDM slot → players with CDM or CM in positions[]
// CM  slot → players with CM or CDM or CAM in positions[]
// CAM slot → players with CAM or CM in positions[]
// All other slots → exact match
function getPlayersForSlot(slot) {
  let eligible;
  if (slot === "CDM") {
    eligible = PLAYERS.filter(p => p.positions.includes("CDM") || p.positions.includes("CM"));
  } else if (slot === "CM") {
    eligible = PLAYERS.filter(p => p.positions.includes("CM") || p.positions.includes("CDM") || p.positions.includes("CAM"));
  } else if (slot === "CAM") {
    eligible = PLAYERS.filter(p => p.positions.includes("CAM") || p.positions.includes("CM"));
  } else {
    eligible = PLAYERS.filter(p => p.positions.includes(slot));
  }
  return eligible.filter(p => !state.drafted.has(p.name));
}

let state = {};

function freshState() {
  return {
    names: ["Player 1", "Player 2"],
    turn: 0,
    squads: [ LAYOUT.map(() => null), LAYOUT.map(() => null) ],
    drafted: new Set(),
    pendingSlot: null,
  };
}

function toast(msg, ms = 2000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickCandidates(slot, count = 5) {
  const pool = getPlayersForSlot(slot);
  return shuffle(pool).slice(0, Math.min(count, pool.length));
}

const FALLBACK = "data:image/svg+xml," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="#333" width="200" height="200"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="80">⚽</text></svg>'
);

function cardHTML(player, displayPos, clickable = true) {
  const sp = player.rarity === "special";
  const tc = sp ? "-special" : "";
  return `
  <div class="fifa-card ${player.rarity}" ${clickable ? `onclick="selectPlayer('${encodeURIComponent(player.name)}')"` : ""}>
    <div class="card-top">
      <div>
        <div class="card-ovr${tc}">${player.rating}</div>
        <div class="card-pos${tc}">${displayPos || player.positions[0]}</div>
      </div>
    </div>
    <div class="card-face-wrap">
      <img src="${player.face}" alt="${player.name}" onerror="this.src='${FALLBACK}'" />
    </div>
    <div class="card-name${tc}">${player.name}</div>
    <div class="card-divider"></div>
    <div class="card-stats">
      <div class="card-stat"><div class="stat-val${tc}">${player.attack}</div><div class="stat-lbl${tc}">ATT</div></div>
      <div class="card-stat"><div class="stat-val${tc}">${player.midfield}</div><div class="stat-lbl${tc}">MID</div></div>
      <div class="card-stat"><div class="stat-val${tc}">${player.defense}</div><div class="stat-lbl${tc}">DEF</div></div>
    </div>
    <div class="card-nation${tc}">${player.nation} · ${player.club}</div>
  </div>`;
}

function buildPitch(playerIdx) {
  const pitchEl = document.getElementById(`pitch${playerIdx + 1}`);
  const isMyTurn = state.turn === playerIdx;
  const squad = state.squads[playerIdx];

  const rows = {};
  LAYOUT.forEach((s, i) => {
    if (!rows[s.row]) rows[s.row] = [];
    rows[s.row].push({ slotDef: s, slotIdx: i });
  });

  let html = '<div class="formation-grid">';
  // Descending row order = ST at top, GK at bottom
  Object.keys(rows).sort((a, b) => Number(b) - Number(a)).forEach(rowKey => {
    html += '<div class="row">';
    rows[rowKey].forEach(({ slotDef, slotIdx }) => {
      const player = squad[slotIdx];
      if (player) {
        html += `
        <div class="slot-btn filled">
          <img class="mini-face" src="${player.face}" onerror="this.src='${FALLBACK}'" />
          <div class="mini-name">${player.name.split(" ").pop()}</div>
          <div class="mini-rat">${player.rating}</div>
        </div>`;
      } else if (isMyTurn) {
        html += `
        <button class="slot-btn" onclick="openPick(${playerIdx}, ${slotIdx})">
          <div class="pos-label">${slotDef.label}</div>
          <div style="font-size:7px;color:var(--muted)">tap</div>
        </button>`;
      } else {
        html += `
        <div class="slot-btn locked">
          <div class="pos-label">${slotDef.label}</div>
        </div>`;
      }
    });
    html += '</div>';
  });
  html += '</div>';
  pitchEl.innerHTML = html;
}

function rebuildPitches() {
  buildPitch(0);
  buildPitch(1);
  updateHeader();
}

function updateHeader() {
  const name = state.names[state.turn];
  const banner = document.getElementById("turn-banner");
  banner.textContent = `— ${name.toUpperCase()}'S TURN —`;
  banner.className = `turn-banner p${state.turn + 1}`;
  const f0 = state.squads[0].filter(Boolean).length;
  const f1 = state.squads[1].filter(Boolean).length;
  document.getElementById("pill1").textContent = `${state.names[0].toUpperCase()}: ${f0}/11`;
  document.getElementById("pill2").textContent = `${state.names[1].toUpperCase()}: ${f1}/11`;
}

function openPick(playerIdx, slotIdx) {
  if (state.turn !== playerIdx) { toast("Not your turn!"); return; }
  const slotDef = LAYOUT[slotIdx];
  const candidates = pickCandidates(slotDef.slot);
  if (candidates.length === 0) { toast("No players left for this slot!"); return; }
  state.pendingSlot = { playerIdx, slotIdx };
  document.getElementById("pick-pos-label").textContent = slotDef.label;
  const grid = document.getElementById("card-grid");
  // Show card with the slot label so player knows what position they're picking for
  grid.innerHTML = candidates.map(p => cardHTML(p, slotDef.slot, true)).join("");
  document.getElementById("pick-overlay").classList.add("open");
}

function selectPlayer(encodedName) {
  const name = decodeURIComponent(encodedName);
  const player = PLAYERS.find(p => p.name === name);
  if (!player) return;
  const { playerIdx, slotIdx } = state.pendingSlot;
  state.squads[playerIdx][slotIdx] = player;
  state.drafted.add(player.name);
  document.getElementById("pick-overlay").classList.remove("open");

  const p1Done = state.squads[0].every(Boolean);
  const p2Done = state.squads[1].every(Boolean);
  if (p1Done && p2Done) { setTimeout(showResult, 400); return; }

  const otherIdx = 1 - playerIdx;
  if (state.squads[otherIdx].some(s => s === null)) { state.turn = otherIdx; }
  else if (state.squads[playerIdx].some(s => s === null)) { state.turn = playerIdx; }

  rebuildPitches();
  toast(`${player.name} drafted!`);
}

function calcScores(squad) {
  let attSum=0,attN=0,midSum=0,midN=0,defSum=0,defN=0;
  squad.forEach((player, i) => {
    if (!player) return;
    const c = LAYOUT[i].contributes;
    if (c==="attack")   { attSum+=player.attack;   attN++; }
    if (c==="midfield") { midSum+=player.midfield; midN++; }
    if (c==="defense")  { defSum+=player.defense;  defN++; }
    if (c==="both_dm")  { defSum+=player.defense;  defN++; midSum+=player.midfield; midN++; }
    if (c==="both_cam") { midSum+=player.midfield; midN++; attSum+=player.attack;   attN++; }
  });
  const att = attN ? Math.round(attSum/attN) : 0;
  const mid = midN ? Math.round(midSum/midN) : 0;
  const def = defN ? Math.round(defSum/defN) : 0;
  return { att, mid, def, total: Math.round((att+mid+def)/3) };
}

function showResult() {
  const s0 = calcScores(state.squads[0]);
  const s1 = calcScores(state.squads[1]);
  const n0 = state.names[0], n1 = state.names[1];
  const winnerEl = document.getElementById("result-winner");
  if (s0.total > s1.total)      { winnerEl.textContent=`🏆 ${n0.toUpperCase()} WINS!`; winnerEl.className="result-winner-name p1"; }
  else if (s1.total > s0.total) { winnerEl.textContent=`🏆 ${n1.toUpperCase()} WINS!`; winnerEl.className="result-winner-name p2"; }
  else                          { winnerEl.textContent="IT'S A DRAW!"; winnerEl.className="result-winner-name draw"; }

  function scoreCardHTML(s, os, name, cls) {
    return `
    <div class="score-card ${cls}">
      <h3>${name.toUpperCase()}</h3>
      <div class="score-row"><span class="label">⚔️ ATTACK</span><span class="value ${s.att>=os.att?'best':''}">${s.att}</span></div>
      <div class="score-row"><span class="label">🔵 MIDFIELD</span><span class="value ${s.mid>=os.mid?'best':''}">${s.mid}</span></div>
      <div class="score-row"><span class="label">🛡️ DEFENCE</span><span class="value ${s.def>=os.def?'best':''}">${s.def}</span></div>
      <div class="total-score">${s.total}</div>
    </div>`;
  }
  document.getElementById("scoreboard").innerHTML =
    scoreCardHTML(s0,s1,n0,"p1") + scoreCardHTML(s1,s0,n1,"p2");

  document.getElementById("squad1-title").textContent = n0.toUpperCase();
  document.getElementById("squad2-title").textContent = n1.toUpperCase();
  document.getElementById("squad1-cards").innerHTML = state.squads[0].map((p,i) => p ? cardHTML(p, LAYOUT[i].slot, false) : "").join("");
  document.getElementById("squad2-cards").innerHTML = state.squads[1].map((p,i) => p ? cardHTML(p, LAYOUT[i].slot, false) : "").join("");
  showScreen("result");
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(`screen-${name}`).classList.add("active");
}

function startDraft() {
  const n1 = document.getElementById("name1").value.trim() || "Player 1";
  const n2 = document.getElementById("name2").value.trim() || "Player 2";
  state = freshState();
  state.names = [n1, n2];
  document.getElementById("p1-name-head").textContent = n1.toUpperCase();
  document.getElementById("p2-name-head").textContent = n2.toUpperCase();
  showScreen("draft");
  rebuildPitches();
}

function resetGame() { showScreen("intro"); }

document.getElementById("pick-overlay").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("open");
});
</script>
