<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Draft Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f5c842;--pitch:#1a6b2e;--pitch2:#155924;
  --dark:#0d0d0d;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;
  --p1:#3b82f6;--p2:#ef4444;--p1bg:#0a1a2e;--p2bg:#1a0a0a;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;
  --fh:'Bebas Neue',sans-serif;--fb:'Barlow Condensed',sans-serif;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--fb);overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
#screen-intro{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#152a15,#0d0d0d 70%);text-align:center;gap:22px;padding:40px 20px}
.logo{font-family:var(--fh);font-size:clamp(50px,12vw,92px);letter-spacing:6px;line-height:1;color:var(--gold);text-shadow:0 0 60px rgba(245,200,66,.3)}
.sub{font-size:18px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.name-inputs{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.name-inputs input{background:#111;border:2px solid var(--border);color:var(--text);font-family:var(--fb);font-size:17px;letter-spacing:2px;padding:11px 16px;border-radius:6px;width:200px;text-align:center;transition:border-color .2s}
.name-inputs input:focus{outline:none;border-color:var(--gold)}
.name-inputs input::placeholder{color:#444}
.btn{font-family:var(--fh);font-size:20px;letter-spacing:3px;background:var(--gold);color:#000;border:none;padding:13px 36px;border-radius:6px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,200,66,.3)}
.pitch-decor{width:min(400px,80vw);height:5px;background:repeating-linear-gradient(90deg,var(--pitch) 0 28px,var(--pitch2) 28px 56px);border-radius:3px}
#screen-draft{flex-direction:column;height:100vh;overflow:hidden}
.draft-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#0a0a0a;border-bottom:2px solid var(--border);flex-shrink:0;gap:6px;flex-wrap:wrap}
.turn-banner{font-family:var(--fh);font-size:17px;letter-spacing:2px}
.turn-banner.p1{color:var(--p1)}.turn-banner.p2{color:var(--p2)}
.pills{display:flex;gap:5px}
.pill{font-size:10px;letter-spacing:1px;padding:4px 9px;border-radius:4px;font-weight:700}
.pill.p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.pill.p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.draft-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.pitch-panel{flex:1;display:flex;flex-direction:column;min-height:0;border-bottom:2px solid var(--border)}
.pitch-panel:last-child{border-bottom:none}
.pitch-label{font-family:var(--fh);font-size:11px;letter-spacing:3px;padding:3px 8px;flex-shrink:0}
.pitch-panel.p1 .pitch-label{color:var(--p1);background:var(--p1bg)}
.pitch-panel.p2 .pitch-label{color:var(--p2);background:var(--p2bg)}
.pitch-wrap{flex:1;background:repeating-linear-gradient(0deg,transparent 0,transparent 47px,rgba(255,255,255,.04) 47px,rgba(255,255,255,.04) 48px),linear-gradient(180deg,var(--pitch),var(--pitch2));padding:3px 4px;display:flex;align-items:stretch;overflow:hidden}
.fgrid{display:flex;flex-direction:column;gap:2px;width:100%;justify-content:space-evenly}
.frow{display:flex;justify-content:center;gap:2px}
.slt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:50px;height:46px;border-radius:5px;border:1px dashed rgba(255,255,255,.22);background:rgba(0,0,0,.32);cursor:pointer;font-family:var(--fb);color:rgba(255,255,255,.65);font-size:8px;font-weight:600;letter-spacing:.5px;transition:border-color .2s,background .2s,transform .1s;padding:2px;text-align:center;flex-shrink:0}
.slt .plbl{font-family:var(--fh);font-size:12px;letter-spacing:1px;color:#fff;line-height:1}
.slt:hover:not(.filled):not(.locked){border-color:var(--gold);background:rgba(245,200,66,.1);transform:scale(1.07)}
.slt.filled{border-style:solid;border-color:rgba(255,255,255,.18);background:rgba(0,0,0,.48);cursor:default}
.slt.locked{opacity:.35;cursor:not-allowed}
.slt .mface{width:24px;height:24px;border-radius:50%;object-fit:contain;background:#1a1a1a;flex-shrink:0}
.slt .mname{font-size:6px;text-align:center;line-height:1;color:#ccc;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slt .mrat{font-family:var(--fh);font-size:10px;color:var(--gold);line-height:1}
#pick-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 0 0}
#pick-overlay.open{display:flex}
.pick-header{font-family:var(--fh);font-size:22px;letter-spacing:4px;text-align:center;margin-bottom:8px}
.pick-header span{color:var(--gold)}
.card-dots{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.dot.active{background:var(--gold)}
.swipe-wrap{flex:1;width:100%;overflow:hidden;position:relative}
.swipe-track{display:flex;height:100%;transition:transform .28s ease;will-change:transform}
.fm-card{flex-shrink:0;width:100vw;height:100%;overflow-y:auto;padding:10px 12px 16px}
.fc-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.fc-photo{width:68px;height:68px;border-radius:8px;object-fit:contain;background:#1a1a1a;flex-shrink:0;border:2px solid var(--border)}
.fc-name{font-family:var(--fh);font-size:21px;letter-spacing:2px;color:#fff;line-height:1;margin-bottom:2px}
.fc-season{font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--gold)}
.fc-meta{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.fc-pos-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.fc-pos-badge{font-family:var(--fh);font-size:10px;letter-spacing:1px;padding:2px 7px;border-radius:4px;background:#1a1a1a;border:1px solid var(--border)}
.fc-ovr-row{display:flex;gap:6px;margin-bottom:10px}
.fc-ovr-box{flex:1;background:#111;border-radius:6px;padding:7px;text-align:center;border:1px solid var(--border)}
.fc-ovr-box .onum{font-family:var(--fh);font-size:24px;color:var(--gold);line-height:1}
.fc-ovr-box .olbl{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.fc-attrs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.attr-sec{background:#111;border-radius:6px;padding:7px;border:1px solid var(--border)}
.attr-sec-title{font-family:var(--fh);font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:5px}
.attr-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid #1a1a1a}
.attr-row:last-child{border-bottom:none}
.attr-nm{font-size:10px;color:var(--muted)}
.attr-vw{display:flex;align-items:center;gap:4px}
.attr-n{font-family:var(--fh);font-size:12px;min-width:20px;text-align:right}
.attr-b{width:44px;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.attr-bf{height:100%;border-radius:2px}
.fc-traits{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.trait-pill{font-size:9px;letter-spacing:.5px;padding:2px 7px;border-radius:10px;background:#1a2a1a;border:1px solid #2a4a2a;color:var(--green)}
.pick-btn{width:calc(100% - 24px);margin:0 12px;font-family:var(--fh);font-size:19px;letter-spacing:3px;background:var(--gold);color:#000;border:none;padding:13px;border-radius:8px;cursor:pointer}
.swipe-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;gap:8px;flex-shrink:0}
.nav-arr{font-family:var(--fh);font-size:15px;letter-spacing:1px;background:#1a1a1a;color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:6px;cursor:pointer;flex:1;text-align:center}
.nav-arr:disabled{opacity:.3;cursor:default}
.nav-count{font-family:var(--fh);font-size:15px;letter-spacing:2px;color:var(--muted);flex-shrink:0}
.close-pick{font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 8px}
#screen-result{align-items:center;background:radial-gradient(ellipse at 50% 0%,#152a15,#0d0d0d 55%);padding:16px 10px;gap:14px;overflow-y:auto}
.res-sec{width:100%;max-width:680px;background:#0f0f0f;border:1px solid var(--border);border-radius:10px;padding:14px}
.res-sec h3{font-family:var(--fh);font-size:17px;letter-spacing:3px;color:var(--gold);margin-bottom:12px}
.result-title{font-family:var(--fh);font-size:clamp(28px,8vw,60px);letter-spacing:6px;color:var(--gold);text-align:center;text-shadow:0 0 40px rgba(245,200,66,.4)}
.result-winner{font-family:var(--fh);font-size:clamp(18px,5vw,38px);letter-spacing:4px;text-align:center}
.result-winner.p1{color:var(--p1)}.result-winner.p2{color:var(--p2)}.result-winner.draw{color:var(--gold)}
.scoreline-big{font-family:var(--fh);font-size:clamp(36px,9vw,72px);letter-spacing:4px;text-align:center;color:#fff;margin:4px 0}
.phase-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.phase-lbl{font-family:var(--fh);font-size:11px;letter-spacing:1px;color:var(--muted);width:84px;flex-shrink:0;text-align:right}
.phase-bar{flex:1;height:13px;background:#1a1a1a;border-radius:7px;overflow:hidden;display:flex;border:1px solid var(--border)}
.pb1{background:var(--p1)}.pb2{background:var(--p2)}
.phase-scores{display:flex;justify-content:space-between;font-family:var(--fh);font-size:12px;color:var(--muted);margin-top:1px;padding:0 1px}
.ps-best{color:var(--gold)}
.tac-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tac-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tac-section h4{font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.winner-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--fh);letter-spacing:1px}
.wt-p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.wt-p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.wt-draw{background:#1a1a1a;color:var(--muted);border:1px solid var(--border)}
.tac-text{font-size:13px;color:var(--muted);line-height:1.7}
.tac-text strong{color:var(--text)}
.tac-text em{color:var(--muted);font-style:italic;font-size:11px}
.pvp-card{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.pvp-card:last-child{margin-bottom:0}
.pvp-title{font-family:var(--fh);font-size:14px;letter-spacing:1px;color:var(--gold);margin-bottom:2px}
.pvp-sub{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:6px}
.pvp-score-row{display:flex;justify-content:space-between;font-family:var(--fh);font-size:15px;margin-bottom:3px}
.pvp-bar{height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;display:flex;margin-bottom:4px}
.pvp-dom{font-family:var(--fh);font-size:11px;letter-spacing:1px;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
.pvp-dom.p1{background:var(--p1bg);color:var(--p1);border:1px solid var(--p1)}
.pvp-dom.p2{background:var(--p2bg);color:var(--p2);border:1px solid var(--p2)}
.pvp-dom.draw{background:#1a1a1a;color:var(--muted);border:1px solid var(--border)}
.pvp-stats{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.pvp-stat-box{background:#111;border:1px solid var(--border);border-radius:5px;padding:5px 7px;text-align:center;flex:1;min-width:55px}
.pvp-stat-val{font-family:var(--fh);font-size:13px}
.pvp-stat-lbl{font-size:8px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.pvp-text{font-size:12px;color:var(--muted);line-height:1.65}
.pvp-text strong{color:var(--text)}
.rat-table{width:100%;border-collapse:collapse}
.rat-table th{font-family:var(--fh);font-size:11px;letter-spacing:1px;color:var(--muted);padding:3px 5px;text-align:left;border-bottom:1px solid var(--border)}
.rat-table td{padding:5px 5px;border-bottom:1px solid #151515;font-size:12px;vertical-align:middle}
.rat-table tr:last-child td{border-bottom:none}
.rnum{font-family:var(--fh);font-size:15px}
.rnum.elite{color:var(--gold)}.rnum.good{color:var(--green)}.rnum.avg{color:var(--text)}.rnum.poor{color:var(--amber)}.rnum.bad{color:var(--red)}
.rbar{display:inline-block;width:52px;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:5px}
.rbar-fill{height:100%;border-radius:3px}
.mom-tag{background:var(--gold);color:#000;font-family:var(--fh);font-size:9px;letter-spacing:1px;padding:2px 5px;border-radius:3px;margin-left:4px}
.goal-tag{background:#1a3a1a;color:var(--green);font-family:var(--fh);font-size:9px;padding:2px 5px;border-radius:3px;margin-left:3px}
.assist-tag{background:#1a1a3a;color:var(--p1);font-family:var(--fh);font-size:9px;padding:2px 5px;border-radius:3px;margin-left:3px}
.goal-ev{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #151515;align-items:flex-start}
.goal-ev:last-child{border-bottom:none}
.gmin{font-family:var(--fh);font-size:13px;color:var(--gold);min-width:32px;flex-shrink:0}
.gtext{font-size:13px;line-height:1.5}
.gtext .gs{color:var(--gold);font-weight:700}
.gtext .ga{color:var(--green)}
.gtext .gd{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.syn-log{font-size:11px;color:var(--muted);line-height:1.6;padding:4px 0;border-bottom:1px solid #151515}
.syn-log:last-child{border-bottom:none}
.syn-log .sn-label{color:var(--green);font-weight:700}
.weak-grid{display:flex;gap:8px;flex-wrap:wrap}
.weak-card{flex:1;min-width:150px;background:#0a0a0a;border-radius:7px;padding:9px;border:1px solid var(--border)}
.weak-card h4{font-family:var(--fh);font-size:12px;letter-spacing:2px;margin-bottom:7px}
.weak-card.p1 h4{color:var(--p1)}.weak-card.p2 h4{color:var(--p2)}
.weak-item{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid #151515;line-height:1.4}
.weak-item:last-child{border-bottom:none}
.wil{color:var(--red);font-weight:700}
.squad-wrap{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.squad-col{flex:1;min-width:140px}
.squad-col h4{font-family:var(--fh);font-size:12px;letter-spacing:2px;margin-bottom:6px;text-align:center}
.squad-col h4.p1{color:var(--p1)}.squad-col h4.p2{color:var(--p2)}
.squad-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #151515}
.squad-item:last-child{border-bottom:none}
.si-face{width:28px;height:28px;border-radius:50%;object-fit:contain;background:#1a1a1a;flex-shrink:0}
.si-name{font-size:12px;color:var(--text);line-height:1.1}
.si-pos{font-family:var(--fh);font-size:10px;color:var(--muted);letter-spacing:1px}
.si-ovr{font-family:var(--fh);font-size:14px;color:var(--gold);margin-left:auto;flex-shrink:0}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gold);color:#000;font-family:var(--fh);font-size:16px;letter-spacing:2px;padding:9px 22px;border-radius:6px;z-index:999;transition:transform .28s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.xg-bar{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
.xg-bar .xg-lbl{color:var(--muted);width:24px;font-family:var(--fh);font-size:11px}
.xg-fill-wrap{flex:1;height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden}
.xg-fill{height:100%;border-radius:4px}
.xg-val{font-family:var(--fh);font-size:12px;color:var(--muted);min-width:30px;text-align:right}
</style>
</head>
<body>

<section id="screen-intro" class="screen active">
  <div class="logo">DRAFT<br/>ZONE</div>
  <div class="sub">Dynamic Match Engine</div>
  <div class="pitch-decor"></div>
  <div class="name-inputs">
    <input id="name1" type="text" maxlength="14" placeholder="PLAYER 1"/>
    <input id="name2" type="text" maxlength="14" placeholder="PLAYER 2"/>
  </div>
  <button class="btn" onclick="startDraft()">KICK OFF</button>
</section>

<section id="screen-draft" class="screen">
  <div class="draft-header">
    <div id="turn-banner" class="turn-banner p1">— PLAYER 1'S TURN —</div>
    <div class="pills">
      <div id="pill1" class="pill p1">P1: 0/11</div>
      <div id="pill2" class="pill p2">P2: 0/11</div>
    </div>
  </div>
  <div class="draft-body">
    <div class="pitch-panel p1"><div class="pitch-label" id="p1head">PLAYER 1</div><div class="pitch-wrap" id="pitch1"></div></div>
    <div class="pitch-panel p2"><div class="pitch-label" id="p2head">PLAYER 2</div><div class="pitch-wrap" id="pitch2"></div></div>
  </div>
</section>

<div id="pick-overlay">
  <div class="pick-header">PICK YOUR <span id="pick-lbl">PLAYER</span></div>
  <div class="card-dots" id="card-dots"></div>
  <div class="swipe-wrap" id="swipe-wrap"><div class="swipe-track" id="swipe-track"></div></div>
  <div class="swipe-nav">
    <button class="nav-arr" id="nav-prev" onclick="swipeNav(-1)">◀ PREV</button>
    <span class="nav-count" id="nav-count">1 / 5</span>
    <button class="nav-arr" id="nav-next" onclick="swipeNav(1)">NEXT ▶</button>
    <button class="close-pick" onclick="closePick()">✕</button>
  </div>
  <button class="pick-btn" onclick="confirmPick()">✓ DRAFT THIS PLAYER</button>
</div>

<section id="screen-result" class="screen">
  <div class="result-title">FULL TIME</div>
  <div id="res-winner" class="result-winner"></div>
  <div id="scoreline-big" class="scoreline-big"></div>
  <div class="res-sec" style="max-width:680px;width:100%">
    <h3>📊 XG & PHASE BREAKDOWN</h3>
    <div id="xg-section"></div>
    <div id="phase-rows" style="margin-top:10px"></div>
  </div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>🔍 TACTICAL BREAKDOWN</h3><div id="tac-breakdown"></div></div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>⚡ SYNERGY ANALYSIS</h3><div id="syn-section"></div></div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>⚽ GOALSCORERS</h3><div id="goal-events"></div></div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>🏅 PLAYER RATINGS</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:230px"><div id="rname1" style="font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--p1);margin-bottom:6px"></div><table class="rat-table" id="rtable1"></table></div>
      <div style="flex:1;min-width:230px"><div id="rname2" style="font-family:var(--fh);font-size:13px;letter-spacing:2px;color:var(--p2);margin-bottom:6px"></div><table class="rat-table" id="rtable2"></table></div>
    </div>
  </div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>⚔️ PLAYER BATTLES</h3><div id="pvp-battles"></div></div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>⚠️ VULNERABILITIES</h3><div class="weak-grid" id="weak-grid"></div></div>
  <div class="res-sec" style="max-width:680px;width:100%"><h3>📋 SQUADS</h3><div class="squad-wrap" id="squad-wrap"></div></div>
  <button class="btn" style="margin-top:6px;margin-bottom:28px" onclick="resetGame()">PLAY AGAIN</button>
</section>

<div id="toast"></div>

<!-- Load in order: players, extra players, engine, then game logic -->
<script src="players.js"></script>
<script src="players_extra.js"></script>
<script src="engine.js?v=11"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  LAYOUT & POSITION WEIGHTS — exposed on window for engine
// ═══════════════════════════════════════════════════════════
window.LAYOUT=[
  {slot:"GK", label:"GK", role:"gk", row:0},
  {slot:"LB", label:"LB", role:"lb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"CB", label:"CB", role:"cb", row:1},
  {slot:"RB", label:"RB", role:"rb", row:1},
  {slot:"CDM",label:"CDM",role:"cdm",row:3},
  {slot:"CM", label:"CM", role:"cm", row:3},
  {slot:"CAM",label:"CAM",role:"cam",row:3},
  {slot:"LW", label:"LW", role:"lw", row:4},
  {slot:"RW", label:"RW", role:"rw", row:4},
  {slot:"ST", label:"ST", role:"st", row:5},
];
window.PW={
  gk:{goalkeeperRating:.30,reflexes:.25,commandOfArea:.18,distribution:.12,aerial:.08,physical:.04,intelligence:.03},
  cb:{defensiveAwareness:.24,tackling:.22,aerial:.16,physical:.14,pace:.10,intelligence:.10,positioning:.04},
  lb:{pace:.13,defensiveAwareness:.13,tackling:.12,crossing:.12,workRate:.10,stamina:.09,intelligence:.09,attack:.08,creativity:.07,physical:.07},
  rb:{pace:.13,defensiveAwareness:.13,tackling:.12,crossing:.12,workRate:.10,stamina:.09,intelligence:.09,attack:.08,creativity:.07,physical:.07},
  cdm:{defensiveAwareness:.24,tackling:.22,positioning:.16,physical:.12,intelligence:.12,midfield:.08,workRate:.06},
  cm:{midfield:.20,passing:.16,pressResistance:.14,intelligence:.12,workRate:.11,stamina:.09,technical:.10,creativity:.08},
  cam:{creativity:.22,passing:.18,technical:.14,intelligence:.12,finishing:.10,attack:.10,dribbling:.08,pressResistance:.06},
  lw:{pace:.17,dribbling:.17,attack:.14,creativity:.12,finishing:.11,crossing:.09,transitionThreat:.10,workRate:.06,physical:.04},
  rw:{pace:.17,dribbling:.17,attack:.14,creativity:.12,finishing:.11,crossing:.09,transitionThreat:.10,workRate:.06,physical:.04},
  st:{finishing:.24,positioning:.20,attack:.16,pace:.11,physical:.10,aerial:.08,intelligence:.07,pressResistance:.04},
};
// expose helpers for engine
window.a=ENGINE.a || ENGINE.attr;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let state={};
let swipeIdx=0,swipeCandidates=[];
function freshState(){return{names:["P1","P2"],turn:0,squads:[LAYOUT.map(()=>null),LAYOUT.map(()=>null)],drafted:new Set(),pendingSlot:null}}

function toast(msg,ms=2200){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),ms)}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
const clamp=ENGINE.clamp2 || ((v,lo,hi)=>Math.max(lo,Math.min(hi,v)));
const FB="data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="#222" width="100" height="100"/><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="44">⚽</text></svg>');
const sn=ENGINE.sname || (p=>p&&p.name?String(p.name).split("—")[0].trim():"?");
const attrCol=ENGINE.attrCol2 || (v=>v>=88?"#4ade80":v>=78?"#a3e635":v>=66?"#fbbf24":v>=52?"#f97316":"#f87171");

function poolForSlot(slot){
  const dg=new Set(PLAYERS.filter(p=>state.drafted.has(p.name)&&p.playerGroup).map(p=>p.playerGroup));
  let el;
  if(slot==="CDM")el=PLAYERS.filter(p=>p.positions.includes("CDM"));
  else if(slot==="CM")el=PLAYERS.filter(p=>p.positions.includes("CM"));
  else if(slot==="CAM")el=PLAYERS.filter(p=>p.positions.includes("CAM"));
  else el=PLAYERS.filter(p=>p.positions.includes(slot));
  return el.filter(p=>!state.drafted.has(p.name)&&!(p.playerGroup&&dg.has(p.playerGroup)));
}

// ═══════════════════════════════════════════════════════════
//  FM CARD HTML
// ═══════════════════════════════════════════════════════════
function fmCardHTML(p,slot){
  const E=ENGINE;
  const role=LAYOUT.find(l=>l.slot===slot)?.role||"cm";
  const ps=E.posScore2 ? E.posScore2(p,role) : (p.overall || 70);
  function ar(nm,val){val=val??0;return`<div class="attr-row"><span class="attr-nm">${nm}</span><div class="attr-vw"><span class="attr-n" style="color:${attrCol(val)}">${val}</span><div class="attr-b"><div class="attr-bf" style="width:${val}%;background:${attrCol(val)}"></div></div></div></div>`}
  let secs=[];
  if(role==="gk")secs=[{t:"GOALKEEPING",a:[["GK Rating",p.goalkeeperRating],["Reflexes",p.reflexes],["Command",p.commandOfArea],["Distribution",p.distribution],["Aerial",p.aerial]]},{t:"MENTAL/PHYS",a:[["Intelligence",p.intelligence],["Physical",p.physical],["Stamina",p.stamina],["Leadership",p.leadership]]}];
  else if(["cb","lb","rb"].includes(role))secs=[{t:"DEFENDING",a:[["Def Awareness",p.defensiveAwareness],["Tackling",p.tackling],["Positioning",p.positioning],["Aerial",p.aerial]]},{t:"PHYSICAL",a:[["Pace",p.pace],["Physical",p.physical],["Stamina",p.stamina],["Work Rate",p.workRate]]},{t:"ATTACKING",a:[["Crossing",p.crossing],["Attack",p.attack],["Passing",p.passing]]},{t:"MENTAL",a:[["Intelligence",p.intelligence],["Big Game",p.bigGameRating],["Consistency",p.consistency]]}];
  else if(["cdm","cm"].includes(role))secs=[{t:"MIDFIELD",a:[["Midfield",p.midfield],["Passing",p.passing],["Technical",p.technical],["Creativity",p.creativity]]},{t:"DEFENDING",a:[["Def Awareness",p.defensiveAwareness],["Tackling",p.tackling],["Press Resist",p.pressResistance],["Positioning",p.positioning]]},{t:"PHYSICAL",a:[["Pace",p.pace],["Physical",p.physical],["Stamina",p.stamina],["Work Rate",p.workRate]]},{t:"MENTAL",a:[["Intelligence",p.intelligence],["Big Game",p.bigGameRating],["Consistency",p.consistency]]}];
  else if(role==="cam")secs=[{t:"CREATING",a:[["Creativity",p.creativity],["Passing",p.passing],["Technical",p.technical],["Dribbling",p.dribbling]]},{t:"ATTACKING",a:[["Attack",p.attack],["Finishing",p.finishing],["Positioning",p.positioning],["Set Pieces",p.setPieces]]},{t:"PHYSICAL",a:[["Pace",p.pace],["Physical",p.physical],["Stamina",p.stamina],["Work Rate",p.workRate]]},{t:"MENTAL",a:[["Intelligence",p.intelligence],["Press Resist",p.pressResistance],["Big Game",p.bigGameRating]]}];
  else secs=[{t:"ATTACKING",a:[["Attack",p.attack],["Finishing",p.finishing],["Positioning",p.positioning],["Dribbling",p.dribbling]]},{t:"SPEED/POWER",a:[["Pace",p.pace],["Trans Threat",p.transitionThreat],["Physical",p.physical],["Aerial",p.aerial]]},{t:"CREATING",a:[["Creativity",p.creativity],["Crossing",p.crossing],["Passing",p.passing],["Set Pieces",p.setPieces]]},{t:"MENTAL",a:[["Intelligence",p.intelligence],["Big Game",p.bigGameRating],["Consistency",p.consistency],["Work Rate",p.workRate]]}];
  const traitsHTML=(p.traits||[]).map(t=>`<div class="trait-pill">${t.replace(/([A-Z])/g,' $1').trim()}</div>`).join("");
  return`<div class="fm-card">
    <div class="fc-top"><img class="fc-photo" src="${p.face}" onerror="this.src='${FB}'"/>
    <div><div class="fc-name">${sn(p)}</div><div class="fc-season">${p.name.includes("—")?p.name.split("—")[1].trim():""}</div>
    <div class="fc-meta">${p.nation} · ${p.club}</div>
    <div class="fc-pos-badges"><div class="fc-pos-badge" style="color:var(--gold);border-color:var(--gold)">${slot}</div>${(p.secondaryPositions||[]).map(s=>`<div class="fc-pos-badge">${s}</div>`).join("")}</div>
    </div></div>
    <div class="fc-ovr-row">
      <div class="fc-ovr-box"><div class="onum">${p.overall}</div><div class="olbl">OVERALL</div></div>
      <div class="fc-ovr-box"><div class="onum" style="color:${attrCol(ps)}">${ps}</div><div class="olbl">POS FIT</div></div>
      <div class="fc-ovr-box"><div class="onum" style="color:${attrCol(p.bigGameRating||70)}">${p.bigGameRating||70}</div><div class="olbl">BIG GAME</div></div>
      <div class="fc-ovr-box"><div class="onum" style="color:${attrCol(p.consistency||70)}">${p.consistency||70}</div><div class="olbl">CONSIST</div></div>
    </div>
    <div class="fc-attrs">${secs.map(s=>`<div class="attr-sec"><div class="attr-sec-title">${s.t}</div>${s.a.map(([n,v])=>ar(n,v)).join("")}</div>`).join("")}</div>
    ${traitsHTML?`<div class="fc-traits">${traitsHTML}</div>`:""}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  PITCH
// ═══════════════════════════════════════════════════════════
function buildPitch(idx){
  const el=document.getElementById(`pitch${idx+1}`);
  const mine=state.turn===idx,sq=state.squads[idx];
  const rows={};
  LAYOUT.forEach((s,i)=>{if(!rows[s.row])rows[s.row]=[];rows[s.row].push({sd:s,si:i})});
  let h='<div class="fgrid">';
  Object.keys(rows).sort((a,b)=>+b-+a).forEach(rk=>{
    h+='<div class="frow">';
    rows[rk].forEach(({sd,si})=>{
      const p=sq[si];
      if(p)h+=`<div class="slt filled"><img class="mface" src="${p.face}" onerror="this.src='${FB}'"/><div class="mname">${sn(p).split(" ").pop()}</div><div class="mrat">${p.overall}</div></div>`;
      else if(mine)h+=`<button class="slt" onclick="openPick(${idx},${si})"><div class="plbl">${sd.label}</div><div style="font-size:6px;color:var(--muted)">tap</div></button>`;
      else h+=`<div class="slt locked"><div class="plbl">${sd.label}</div></div>`;
    });
    h+='</div>';
  });
  h+='</div>';el.innerHTML=h;
}
function rebuildPitches(){buildPitch(0);buildPitch(1);updateHeader()}
function updateHeader(){
  const n=state.names[state.turn];
  const b=document.getElementById("turn-banner");
  b.textContent=`— ${n.toUpperCase()}'S TURN —`;b.className=`turn-banner p${state.turn+1}`;
  const f0=state.squads[0].filter(Boolean).length,f1=state.squads[1].filter(Boolean).length;
  document.getElementById("pill1").textContent=`${state.names[0].toUpperCase()}: ${f0}/11`;
  document.getElementById("pill2").textContent=`${state.names[1].toUpperCase()}: ${f1}/11`;
}
function openPick(pi,si){
  if(state.turn!==pi){toast("Not your turn!");return}
  const sd=LAYOUT[si];const pool=poolForSlot(sd.slot);
  if(!pool.length){toast("No players left!");return}
  state.pendingSlot={pi,si};
  swipeCandidates=shuffle(pool).slice(0,5);swipeIdx=0;
  document.getElementById("pick-lbl").textContent=sd.label;
  const track=document.getElementById("swipe-track");
  track.innerHTML=swipeCandidates.map(p=>fmCardHTML(p,sd.slot)).join("");
  track.style.transform="translateX(0)";
  buildDots();updateSwipeNav();
  document.getElementById("pick-overlay").classList.add("open");
}
function buildDots(){document.getElementById("card-dots").innerHTML=swipeCandidates.map((_,i)=>`<div class="dot${i===swipeIdx?" active":""}"></div>`).join("")}
function swipeNav(dir){
  swipeIdx=clamp(swipeIdx+dir,0,swipeCandidates.length-1);
  document.getElementById("swipe-track").style.transform=`translateX(-${swipeIdx*100}vw)`;
  buildDots();updateSwipeNav();
}
function updateSwipeNav(){
  document.getElementById("nav-prev").disabled=swipeIdx===0;
  document.getElementById("nav-next").disabled=swipeIdx===swipeCandidates.length-1;
  document.getElementById("nav-count").textContent=`${swipeIdx+1} / ${swipeCandidates.length}`;
}
let touchStartX=0;
document.getElementById("swipe-wrap").addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX},{passive:true});
document.getElementById("swipe-wrap").addEventListener("touchend",e=>{const dx=touchStartX-e.changedTouches[0].clientX;if(Math.abs(dx)>40)swipeNav(dx>0?1:-1)},{passive:true});
function confirmPick(){
  const p=swipeCandidates[swipeIdx];if(!p)return;
  const{pi,si}=state.pendingSlot;
  state.squads[pi][si]=p;state.drafted.add(p.name);
  document.getElementById("pick-overlay").classList.remove("open");
  const d1=state.squads[0].every(Boolean),d2=state.squads[1].every(Boolean);
  if(d1&&d2){setTimeout(showResult,350);return}
  const other=1-pi;
  if(state.squads[other].some(s=>s===null))state.turn=other;
  else if(state.squads[pi].some(s=>s===null))state.turn=pi;
  rebuildPitches();toast(`${sn(p)} drafted!`);
}
function closePick(){document.getElementById("pick-overlay").classList.remove("open")}

// ═══════════════════════════════════════════════════════════
//  SHOW RESULT
// ═══════════════════════════════════════════════════════════
function showResult(){
  const n0=state.names[0],n1=state.names[1];
  const E=ENGINE;

  // Run full engine
  const phases=E.calcFullPhases(state.squads[0],state.squads[1]);
  const{rA,rB}=E.dynamicPlayerRatings(state.squads[0],state.squads[1],phases);
  const sl=E.dynamicScoreline(phases.aAtk,phases.bAtk,phases.aDefStr,phases.bDefStr,phases.aGK,phases.bGK,phases.aSynScore,phases.bSynScore,phases.momentum);
  const goalEvents=E.dynamicGoalEvents(state.squads[0],state.squads[1],phases,sl.goalsA,sl.goalsB,n0,n1);
  const pvpBattles=E.calcDeepPvP(state.squads[0],state.squads[1],phases,n0,n1);
  const tacSections=E.deepTacticalBreakdown(phases,n0,n1);
  const wkA=E.contextualWeaknesses(phases.TA,phases.TB,phases.tacA,phases.tacB);
  const wkB=E.contextualWeaknesses(phases.TB,phases.TA,phases.tacB,phases.tacA);

  // Boost scorers/assisters ratings
  goalEvents.forEach(ev=>{
    const rats=ev.team===0?rA:rB;
    if(ev.scorer){const r=rats.find(x=>x.p.name===ev.scorer.name);if(r)r.rat=Math.min(9.9,r.rat+E.rng2(.35,.85))}
    if(ev.assist){const r=rats.find(x=>x.p.name===ev.assist.name);if(r)r.rat=Math.min(9.9,r.rat+E.rng2(.2,.55))}
  });
  rA.forEach(r=>r.rat=Math.round(r.rat*10)/10);
  rB.forEach(r=>r.rat=Math.round(r.rat*10)/10);
  const allR=[...rA.map(r=>({...r,t:0})),...rB.map(r=>({...r,t:1}))];
  const motm=allR.sort((a,b)=>b.rat-a.rat)[0];

  // WINNER
  const diff=phases.aFin-phases.bFin;
  const we=document.getElementById("res-winner");
  if(Math.abs(diff)<1.2){we.textContent="IT'S A DRAW";we.className="result-winner draw"}
  else if(diff>0){we.textContent=`🏆 ${n0.toUpperCase()} WINS`;we.className="result-winner p1"}
  else{we.textContent=`🏆 ${n1.toUpperCase()} WINS`;we.className="result-winner p2"}

  // SCORELINE
  document.getElementById("scoreline-big").innerHTML=
    `<span style="color:var(--p1)">${n0.toUpperCase()}</span> <span style="color:var(--gold)">${sl.goalsA}</span><span style="color:var(--muted);font-size:0.6em"> – </span><span style="color:var(--gold)">${sl.goalsB}</span> <span style="color:var(--p2)">${n1.toUpperCase()}</span>`;

  // XG & PHASE BARS
  const xgMaxA=Math.max(sl.xgA,0.1),xgMaxB=Math.max(sl.xgB,0.1);
  const xgMax=Math.max(xgMaxA,xgMaxB,1);
  document.getElementById("xg-section").innerHTML=`
    <div style="font-family:var(--fh);font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:6px">EXPECTED GOALS</div>
    <div class="xg-bar"><span class="xg-lbl" style="color:var(--p1)">${n0.substring(0,4).toUpperCase()}</span><div class="xg-fill-wrap"><div class="xg-fill" style="width:${(sl.xgA/xgMax*100).toFixed(0)}%;background:var(--p1)"></div></div><span class="xg-val" style="color:var(--p1)">${sl.xgA.toFixed(2)}</span></div>
    <div class="xg-bar"><span class="xg-lbl" style="color:var(--p2)">${n1.substring(0,4).toUpperCase()}</span><div class="xg-fill-wrap"><div class="xg-fill" style="width:${(sl.xgB/xgMax*100).toFixed(0)}%;background:var(--p2)"></div></div><span class="xg-val" style="color:var(--p2)">${sl.xgB.toFixed(2)}</span></div>`;

  const phList=[{l:"ATTACK",a:phases.aAtk,b:phases.bAtk},{l:"MIDFIELD",a:phases.aMid,b:phases.bMid},{l:"DEFENCE",a:phases.aDefStr,b:phases.bDefStr},{l:"TRANSITION",a:phases.aTrans,b:phases.bTrans},{l:"WIDE",a:phases.aWide,b:phases.bWide},{l:"PRESSING",a:phases.aPressScore,b:phases.bPressScore},{l:"SET PIECES",a:phases.aSP,b:phases.bSP},{l:"GOALKEEPER",a:phases.aGK,b:phases.bGK},{l:"SYNERGY",a:phases.aSynScore,b:phases.bSynScore}];
  document.getElementById("phase-rows").innerHTML=phList.map(p=>{
    const tot=p.a+p.b,pa=Math.round(p.a/tot*100),aw=p.a>=p.b;
    return`<div class="phase-row"><div class="phase-lbl">${p.l}</div><div style="flex:1">
      <div class="phase-bar"><div class="pb1" style="width:${pa}%"></div><div class="pb2" style="width:${100-pa}%"></div></div>
      <div class="phase-scores"><span class="${aw?"ps-best":""}">${Math.round(p.a)}</span><span class="${!aw?"ps-best":""}">${Math.round(p.b)}</span></div>
    </div></div>`;
  }).join("");

  // TACTICAL BREAKDOWN
  document.getElementById("tac-breakdown").innerHTML=tacSections.map(s=>`
    <div class="tac-section">
      <h4>${s.title}${s.wt?`<span class="winner-tag ${s.wc==="draw"?"wt-draw":s.wc==="p1"?"wt-p1":"wt-p2"}">${s.wt}</span>`:""}
      </h4><div class="tac-text">${s.text}</div></div>`).join("");

  // SYNERGY LOG
  const synLogA=phases.synA.log,synLogB=phases.synB.log;
  let synHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap">`;
  synHTML+=`<div style="flex:1;min-width:200px"><div style="font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--p1);margin-bottom:6px">${n0.toUpperCase()} (${Math.round(phases.aSynScore)})</div>`;
  synHTML+=synLogA.length?synLogA.map(l=>`<div class="syn-log">${l}</div>`).join(""):`<div class="syn-log" style="color:var(--muted)">No significant synergies detected</div>`;
  synHTML+=`</div><div style="flex:1;min-width:200px"><div style="font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--p2);margin-bottom:6px">${n1.toUpperCase()} (${Math.round(phases.bSynScore)})</div>`;
  synHTML+=synLogB.length?synLogB.map(l=>`<div class="syn-log">${l}</div>`).join(""):`<div class="syn-log" style="color:var(--muted)">No significant synergies detected</div>`;
  synHTML+=`</div></div>`;
  document.getElementById("syn-section").innerHTML=synHTML;

  // GOALS
  const scorer0=new Set(goalEvents.filter(e=>e.team===0&&e.scorer).map(e=>e.scorer.name));
  const scorer1=new Set(goalEvents.filter(e=>e.team===1&&e.scorer).map(e=>e.scorer.name));
  const assist0=new Set(goalEvents.filter(e=>e.team===0&&e.assist).map(e=>e.assist.name));
  const assist1=new Set(goalEvents.filter(e=>e.team===1&&e.assist).map(e=>e.assist.name));
  const goalHTML=goalEvents.length?goalEvents.map(ev=>`
    <div class="goal-ev"><div class="gmin">${ev.min}'</div>
    <div class="gtext">⚽ <span class="gs">${sn(ev.scorer)||"?"}</span>${ev.assist?` <span class="ga">(${sn(ev.assist)})</span>`:""}
    <span class="gd" style="color:${ev.team===0?"var(--p1)":"var(--p2)"}">${ev.team===0?n0:n1} · ${ev.method}</span></div></div>`).join("")
    :`<div style="color:var(--muted);font-size:13px;padding:6px 0">No goals — a goalless draw.</div>`;
  document.getElementById("goal-events").innerHTML=goalHTML+`<div style="margin-top:10px;padding:10px;background:#0a0a0a;border-radius:6px;border:1px solid var(--border)">
    <div style="font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--gold)">⭐ MAN OF THE MATCH</div>
    <div style="font-family:var(--fh);font-size:18px;color:#fff;margin-top:2px">${sn(motm.p)}</div>
    <span style="font-family:var(--fh);font-size:18px;color:var(--gold)">${motm.rat.toFixed(1)}</span>
    <span style="font-size:12px;color:var(--muted);margin-left:5px">${motm.role.toUpperCase()} · ${motm.t===0?n0:n1}</span>
  </div>`;

  // PLAYER RATINGS
  function rCls(r){if(r>=8.5)return"elite";if(r>=7.5)return"good";if(r>=6.5)return"avg";if(r>=5.5)return"poor";return"bad"}
  function rBar(r){const pct=clamp(((r-3)/7)*100,0,100);const col=r>=8.5?"var(--gold)":r>=7.5?"var(--green)":r>=6.5?"var(--text)":r>=5.5?"var(--amber)":"var(--red)";return`<span class="rbar"><span class="rbar-fill" style="width:${pct}%;background:${col}"></span></span>`}
  function ratTable(rats,motmName,sc,as){
    const order=["gk","lb","cb","rb","cdm","cm","cam","lw","rw","st"];
    return`<thead><tr><th>POS</th><th>PLAYER</th><th colspan="2">RATING</th></tr></thead><tbody>`+
    rats.sort((a,b)=>order.indexOf(a.role)-order.indexOf(b.role)).map(r=>{
      const nm=sn(r.p).split(" ").pop();
      return`<tr><td style="font-family:var(--fh);font-size:10px;color:var(--muted)">${r.role.toUpperCase()}</td>
        <td style="font-size:11px">${nm}${r.p.name===motmName?`<span class="mom-tag">MOTM</span>`:""}${sc.has(r.p.name)?`<span class="goal-tag">⚽</span>`:""}${as.has(r.p.name)?`<span class="assist-tag">🅰</span>`:""}</td>
        <td><span class="rnum ${rCls(r.rat)}">${r.rat.toFixed(1)}</span></td>
        <td>${rBar(r.rat)}</td></tr>`;
    }).join("")+"</tbody>";
  }
  document.getElementById("rname1").textContent=n0.toUpperCase();
  document.getElementById("rname2").textContent=n1.toUpperCase();
  document.getElementById("rtable1").innerHTML=ratTable(rA,motm.p.name,scorer0,assist0);
  document.getElementById("rtable2").innerHTML=ratTable(rB,motm.p.name,scorer1,assist1);

  // PVP BATTLES
  document.getElementById("pvp-battles").innerHTML=pvpBattles.map(b=>`
    <div class="pvp-card">
      <div class="pvp-title">${b.title}</div>
      <div class="pvp-sub">${b.sub}</div>
      <div class="pvp-score-row"><span style="color:var(--p1)">${b.a}</span><span style="color:var(--p2)">${b.b}</span></div>
      <div class="pvp-bar"><div class="pb1" style="width:${b.a}%"></div><div class="pb2" style="width:${b.b}%"></div></div>
      <div class="pvp-dom ${b.dom.cls}">${b.dom.label}</div>
      <div class="pvp-stats">${b.stats.join("")}</div>
      <div class="pvp-text">${b.narrative}</div>
    </div>`).join("");

  // WEAKNESSES
  document.getElementById("weak-grid").innerHTML=`
    <div class="weak-card p1"><h4>${n0.toUpperCase()} RISKS</h4>${wkA.length?wkA.map(w=>`<div class="weak-item"><span class="wil">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>
    <div class="weak-card p2"><h4>${n1.toUpperCase()} RISKS</h4>${wkB.length?wkB.map(w=>`<div class="weak-item"><span class="wil">▲ ${w.label}:</span> ${w.detail}</div>`).join(""):`<div class="weak-item" style="color:var(--green)">No major vulnerabilities</div>`}</div>`;

  // SQUADS
  const sqHtml=(sq,name,cls)=>`<div class="squad-col"><h4 class="${cls}">${name.toUpperCase()}</h4><div>
    ${LAYOUT.map((l,i)=>{const p=sq[i];if(!p)return"";return`<div class="squad-item"><img class="si-face" src="${p.face}" onerror="this.src='${FB}'"/>
      <div><div class="si-name">${sn(p)}</div><div class="si-pos">${l.slot}${p.name.includes("—")?" · "+p.name.split("—")[1].trim():""}</div></div>
      <div class="si-ovr">${p.overall}</div></div>`;}).join("")}
  </div></div>`;
  document.getElementById("squad-wrap").innerHTML=sqHtml(state.squads[0],n0,"p1")+sqHtml(state.squads[1],n1,"p2");
  showScreen("result");
}

function showScreen(name){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(`screen-${name}`).classList.add("active");window.scrollTo(0,0)}
function startDraft(){
  const n1=document.getElementById("name1").value.trim()||"Player 1";
  const n2=document.getElementById("name2").value.trim()||"Player 2";
  state=freshState();state.names=[n1,n2];
  document.getElementById("p1head").textContent=n1.toUpperCase();
  document.getElementById("p2head").textContent=n2.toUpperCase();
  showScreen("draft");rebuildPitches();
}
function resetGame(){showScreen("intro")}
</script>
</body>
</html>
